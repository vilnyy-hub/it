<!DOCTYPE html>
<html>
<head>
<title>nom nom❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #ffb6c1, #ffe4e1);
    font-family: Arial;
}

/* ===== ГРА ===== */
#score {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 24px;
    font-weight: bold;
    color: #ff1493;
    z-index: 10;
}

#player {
    position: absolute;
    bottom: 20px;
    left: 50%;
    width: 120px;
    height: 60px;
    background: #ff1493;
    border-radius: 20px;
    transform: translateX(-50%);
    text-align: center;
    line-height: 60px;
    color: white;
    font-weight: bold;
    z-index: 10;
}

.katinka {
    position: absolute;
    top: -50px;
    font-size: 30px;
}

/* ===== САЙТ ===== */
h1 {
    color: #ff1493;
    font-size: 30px;
    text-shadow: 2px 2px white;
    margin-top: 80px;
}

p {
    font-size: 18px;
}

img {
    margin-top: 10px;
    border-radius: 20px;
    max-width: 300px;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    transition: transform 0.3s;
}

img:hover {
    transform: scale(1.1);
}

button {
    margin-top: 20px;
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 20px;
    background: #ff1493;
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    transition: 0.3s;
}

button:hover {
    background: #ff69b4;
    transform: scale(1.1);
}

/* ===== СЕКРЕТ ===== */
#secretPanel {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    color: white;
    text-align: center;
    padding-top: 60px;
    z-index: 9999;
}

/* міні гра */
#reactionBtn {
    position: absolute;
    padding: 20px;
    font-size: 20px;
    background: #00ffcc;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    display: none;
}
</style>
</head>

<body>

<!-- ===== ГРА ===== -->
<div id="score">Score: 0</div>
<div id="player">🍬 CATCH</div>

<!-- ===== ТВОЯ ПОЧАТКОВА СТОРІНКА (НЕ ЗМІНЕНО ТЕКСТ) ===== -->
<h1>Welcome to eat катінька simulator😛🥰</h1>

<p>Just try eating катінька🙂‍↕️🦟</p>
<p>eating катінька is so fun and cool🤘😗</p>
<p>just trust me and go eat катінька😁💕</p>
<p>have you eaten катінька yet?🙌👀</p>
<p>okay if youre done eating катінька you are very COOL now🤑😎</p>

<button onclick="eatKatinka()">🍬 Натисни щоб з'їсти катіньку</button>

<img id="katinka1" src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/...">

<p style="color: grey; font-size: 20px; text-align: left;">
катінька we are coming for you😋❤️🫦👀🤺💣📎🥚🚽🌚👼🏿
</p>

<!-- ===== СЕКРЕТНА КНОПКА ===== -->
<button onclick="askPassword()">🔐 Секретний розділ</button>

<script>
let score = 0;
let player = document.getElementById("player");

/* рух мишкою */
document.addEventListener("mousemove", (e) => {
    player.style.left = e.clientX - 60 + "px";
});

/* гра */
function createKatinka() {
    let k = document.createElement("div");
    k.classList.add("katinka");
    k.innerHTML = "😋";
    k.style.left = Math.random() * window.innerWidth + "px";
    k.style.top = "-50px";
    document.body.appendChild(k);

    let fall = setInterval(() => {
        let top = parseInt(k.style.top || 0);
        k.style.top = (top + 5) + "px";

        let pRect = player.getBoundingClientRect();
        let kRect = k.getBoundingClientRect();

        if (
            kRect.bottom >= pRect.top &&
            kRect.left < pRect.right &&
            kRect.right > pRect.left
        ) {
            score++;
            document.getElementById("score").innerText = "Score: " + score;
            k.remove();
            clearInterval(fall);
        }

        if (top > window.innerHeight) {
            k.remove();
            clearInterval(fall);
        }

    }, 20);
}

setInterval(createKatinka, 800);

/* ===== СЕКРЕТ ===== */
function askPassword() {
    let pass = prompt("🔐 Введи пароль:");

    if (pass === "3267") {
        openSecretGame();
    } else {
        alert("❌ Неправильний пароль!");
    }
}

/* відкриття секретної гри */
function openSecretGame() {
    let panel = document.createElement("div");
    panel.id = "secretPanel";

    panel.innerHTML = `
        <h1>🔐 SECRET MINI GAME</h1>
        <p>Натисни кнопку якнайшвидше!</p>

        <button id="reactionBtn" onclick="hitBtn()">CLICK!</button>

        <br><br>
        <button onclick="startGame()">Start Game</button>
        <button onclick="closeSecret()">Close</button>

        <h2 id="result"></h2>
    `;

    document.body.appendChild(panel);
    document.getElementById("secretPanel").style.display = "block";
}

function closeSecret() {
    document.getElementById("secretPanel").remove();
}

/* ===== міні гра ===== */
let startTime;

function startGame() {
    let btn = document.getElementById("reactionBtn");
    btn.style.display = "none";
    document.getElementById("result").innerText = "Чекай...";

    setTimeout(() => {
        btn.style.display = "block";
        btn.style.left = Math.random() * 70 + "%";
        btn.style.top = Math.random() * 60 + "%";
        startTime = Date.now();
    }, Math.random() * 3000 + 1000);
}

function hitBtn() {
    let time = Date.now() - startTime;
    document.getElementById("result").innerText =
        "⚡ Реакція: " + time + " ms";

    document.getElementById("reactionBtn").style.display = "none";
}

/* сайт */
function eatKatinka() {
    alert("😋 ТИ З'ЇВ КАТІНЬКУ!");
}

document.getElementById("katinka1").onclick = function () {
    alert("Ти натиснув катіньку 😛💥");
};
</script>

</body>
</html>
