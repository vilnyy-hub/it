<!DOCTYPE html>
<html>
<head>
<title>nom nom❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #ffb6c1, #ffe4e1);
    font-family: Arial;
}

/* ===== ГРА ===== */
#score {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 24px;
    font-weight: bold;
    color: #ff1493;
    z-index: 10;
}

#player {
    position: absolute;
    bottom: 20px;
    left: 50%;
    width: 120px;
    height: 60px;
    background: #ff1493;
    border-radius: 20px;
    transform: translateX(-50%);
    text-align: center;
    line-height: 60px;
    color: white;
    font-weight: bold;
    z-index: 10;
}

.katinka {
    position: absolute;
    top: -50px;
    font-size: 30px;
}

/* ===== САЙТ ===== */
h1 {
    color: #ff1493;
    font-size: 30px;
    text-shadow: 2px 2px white;
    margin-top: 80px;
}

p {
    font-size: 18px;
}

img {
    margin-top: 10px;
    border-radius: 20px;
    max-width: 300px;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    transition: transform 0.3s;
}

img:hover {
    transform: scale(1.1);
}

button {
    margin-top: 20px;
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 20px;
    background: #ff1493;
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    transition: 0.3s;
}

button:hover {
    background: #ff69b4;
    transform: scale(1.1);
}
</style>
</head>

<body>

<!-- ===== ГРА ===== -->
<div id="score">Score: 0</div>
<div id="player">🍬 CATCH</div>

<!-- ===== САЙТ ===== -->
<h1>Welcome to eat катінька simulator😛🥰</h1>

<p>Just try eating катінька🙂‍↕️🦟</p>
<p>eating катінька is so fun and cool🤘😗</p>
<p>just trust me and go eat катінька😁💕</p>
<p>have you eaten катінька yet?🙌👀</p>
<p>okay if youre done eating катінька you are very COOL now🤑😎</p>

<button onclick="eatKatinka()">🍬 Натисни щоб з'їсти катіньку</button>

<img id="katinka1" src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/...">

<p style="color: grey; font-size: 20px; text-align: left;">
катінька we are coming for you😋❤️🫦👀🤺💣📎🥚🚽🌚👼🏿
</p>

<img src="https://hitscounter.dev/api/hit?url=https%3A%2F%2Fvilnyy-hub.github.io%2Fit%2F1%2Fvika.html&label=&icon=battery-charging&color=%23c11515&message=&style=flat&tz=UTC">

<script>
let score = 0;
let player = document.getElementById("player");

/* рух мишкою */
document.addEventListener("mousemove", (e) => {
    player.style.left = e.clientX - 60 + "px";
});

/* гра */
function createKatinka() {
    let k = document.createElement("div");
    k.classList.add("katinka");
    k.innerHTML = "😋";
    k.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(k);

    let fall = setInterval(() => {
        let top = parseInt(k.style.top || 0);
        k.style.top = (top + 5) + "px";

        let kRect = k.getBoundingClientRect();
        let pRect = player.getBoundingClientRect();

        if (
            kRect.bottom >= pRect.top &&
            kRect.left < pRect.right &&
            kRect.right > pRect.left
        ) {
            score++;
            document.getElementById("score").innerText = "Score: " + score;
            k.remove();
            clearInterval(fall);
        }

        if (top > window.innerHeight) {
            k.remove();
            clearInterval(fall);
        }

    }, 20);
}

setInterval(createKatinka, 800);

/* сайт */
function eatKatinka() {
    alert("😋 ТИ З'ЇВ КАТІНЬКУ! +100 COOL POINTS 🤑");
}

document.getElementById("katinka1").onclick = function () {
    alert("Ти натиснув катіньку 😛💥");
};
</script>

</body>
</html>
