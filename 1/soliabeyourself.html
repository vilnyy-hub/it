<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>🎇Будь собою🥰 — Твій простір спокою</title>
    <style>
        :root {
            --sand-yellow: #f4e1a1;
            --sand-pink: #f4cfdf;
            --text-dark: #5d4037;
            --rain-blue: #add8e6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Verdana', sans-serif;
            background-color: var(--sand-yellow);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            animation: sway 5s ease-in-out forwards;
        }

        @keyframes sway {
            0% { transform: rotate(0deg); }
            20% { transform: rotate(1deg); }
            40% { transform: rotate(-1deg); }
            60% { transform: rotate(0.5deg); }
            80% { transform: rotate(-0.5deg); }
            100% { transform: rotate(0deg); }
        }

        /* Стилі для дощу */
        .rain-drop {
            position: fixed;
            top: -10px;
            width: 2px;
            height: 10px;
            background-color: var(--rain-blue);
            opacity: 0.7;
            pointer-events: none;
            z-index: 1000;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh); }
        }

        header {
            background-color: var(--sand-pink);
            width: 100%;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 { color: #d81b60; margin: 0; }

        .container {
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
        }

        .character-container {
            margin: 20px auto;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            overflow: hidden;
            border: 8px solid var(--sand-pink);
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .character-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            background-color: var(--sand-pink);
            border: 2px solid #f06292;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
            color: var(--text-dark);
        }

        button:hover {
            background-color: #f06292;
            color: white;
            transform: translateY(-3px);
        }

        #ai-response {
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 20px;
            min-height: 50px;
            display: none;
            border: 2px dashed var(--sand-pink);
            line-height: 1.5;
        }

        .unity-section {
            margin-top: 40px;
            text-align: center;
        }

        .unity-section img {
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .footer-counter {
            margin-top: 50px;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🍒 Привіт! Я твій AI-помічник 😎</h1>
    </header>

    <div class="container">
        <p class="intro-text">
            Якщо тобі треба заспокоїтися і поговорити з добрим спеціалістом, тобі до нас! 
            Ми — <strong>"🎇Будь собою🥰"</strong> — завжди допоможемо.
        </p>

        <div class="character-container">
            <img src="https://st2.depositphotos.com/18722762/50790/v/450/depositphotos_507904706-stock-illustration-relax-yoga-crossed-legs-closed.jpg" alt="Дихаюча людина">
        </div>

        <div class="buttons-grid">
            <button onclick="respond('stress')">Мені тривожно 😰</button>
            <button onclick="respond('tired')">Я дуже втомився/лася 😴</button>
            <button onclick="respond('sad')">Мені сумно 😔</button>
            <button onclick="respond('happy')">Хочу поділитися радістю! ✨</button>
        </div>

        <div id="ai-response"></div>

        <div class="unity-section">
            <h3>Ми всі єдині у цьому світі 🤝</h3>
            <img src="https://img.freepik.com/free-vector/people-holding-hands-together-unity-world-peace-concept_53876-64663.jpg" alt="Єдність">
        </div>

        <div style="margin-top: 30px;">
            <p style="font-size: 14px; font-weight: bold;">🎵 Спокійна музика для душі:</p>
            <audio id="bg-music" controls loop>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
                Ваш браузер не підтримує аудіо.
            </audio>
        </div>
    </div>

    <div class="footer-counter">
        <img src="https://hitscounter.dev/api/hit?url=https%3A%2F%2Fvilnyy-hub.github.io%2Fit%2F1%2Fsoliabeyourself.html&label=%D0%A2%D1%96%2C%D1%89%D0%BE+%D1%81%D1%82%D0%B0%D0%BB%D0%B8+%D1%82%D1%80%D0%BE%D1%88%D0%BA%D0%B8+%D1%81%D0%BF%D0%BE%D0%BA%D1%96%D0%B9%D0%BD%D1%96%D1%88%D0%B8%D0%BC%D0%B8&icon=bookmark-heart-fill&color=%23ff6bab&message=&style=plastic&tz=UTC">
    </div>

    <script>
        // Функція для створення дощу на перші 5 секунд
        function createRain() {
            const rainDuration = 5000;
            const endTimestamp = Date.now() + rainDuration;

            const interval = setInterval(() => {
                if (Date.now() > endTimestamp) {
                    clearInterval(interval);
                    return;
                }
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (Math.random() * 1 + 0.5) + 's';
                document.body.appendChild(drop);

                setTimeout(() => drop.remove(), 2000);
            }, 50);
        }

        window.onload = createRain;

        function respond(situation) {
            const box = document.getElementById('ai-response');
            box.style.display = 'block';
            
            const responses = {
                stress: [
                    "Я поруч. Давай зробимо глибокий вдих. Уяви, як тривога виходить із кожним видихом. Ти сильніший/а за свої думки.",
                    "Все добре. Давай просто порахуємо до десяти. Це відчуття скоро мине, я з тобою.",
                    "Зроби ковток води і подивись у вікно. Світ великий, і ти в безпеці. Все буде добре."
                ],
                tired: [
                    "Ти сьогодні зробив/ла достатньо. Твоє тіло просить відпочинку, і це нормально. Дозволь собі просто полежати.",
                    "Відпочинок — це не лінь, це відновлення. Закрий очі на хвилинку і ні про що не думай.",
                    "Світ почекає. Зараз найголовніше — твій спокій. Ти молодець, що піклуєшся про себе."
                ],
                sad: [
                    "Сумувати — це нормально. Я вислухаю тебе. Пам'ятай, що після дощу завжди з'являється сонце.",
                    "Дозволь собі відчути цей сум, але не залишайся в ньому надовго. Ти сонечко, яке просто закрили хмари.",
                    "Я обіймаю тебе ментально. Все налагодиться, крок за кроком. Ти не наодинці."
                ],
                happy: [
                    "Я так радію за тебе! Твоя енергія чудова. Давай збережемо цей момент у пам'яті!",
                    "Це неймовірно! Твоє щастя надихає. Поділися цією усмішкою з кимось сьогодні!",
                    "Чудові новини! Ти заслуговуєш на кожну секунду цієї радості. Нехай так буде завжди!"
                ]
            };
            
            const options = responses[situation];
            const randomMessage = options[Math.floor(Math.random() * options.length)];
            
            box.innerHTML = "<strong>AI Психолог:</strong> " + randomMessage;
        }

        document.body.addEventListener('click', function() {
            const music = document.getElementById('bg-music');
            if (music.paused) {
                music.play().catch(e => console.log("Музика зачекає"));
            }
        }, { once: true });
    </script>
</body>
</html>
