<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>🎇Будь собою🥰 — Твій простір спокою</title>
    <style>
        :root {
            --sand-yellow: #f4e1a1;
            --sand-pink: #f4cfdf;
            --text-dark: #5d4037;
            --rain-blue: #add8e6;
            --accent-pink: #f06292;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Verdana', sans-serif;
            background-color: var(--sand-yellow);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Стилі для великих крапель дощу */
        .rain-drop {
            position: fixed;
            top: -20px;
            width: 4px; /* Збільшено */
            height: 20px; /* Збільшено */
            background-color: var(--rain-blue);
            border-radius: 2px;
            opacity: 0.6;
            pointer-events: none;
            z-index: 1000;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh); }
        }

        header {
            background-color: var(--sand-pink);
            width: 100%;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 { color: #d81b60; margin: 0; }

        .container {
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
        }

        .character-container {
            margin: 20px auto;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            overflow: hidden;
            border: 8px solid var(--sand-pink);
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .character-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Антистрес-зона */
        .antistress-box {
            margin: 40px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            border: 3px dashed var(--sand-pink);
        }

        #antistress-toy {
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, var(--sand-pink), var(--sand-yellow));
            margin: 20px auto;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        .shape-1 { border-radius: 50%; }
        .shape-2 { border-radius: 20%; transform: rotate(45deg); }
        .shape-3 { border-radius: 50% 10% 50% 10%; }
        .shape-4 { border-radius: 30% 60% 70% 40% / 50% 60% 30% 40%; }

        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            background-color: var(--sand-pink);
            border: 2px solid var(--accent-pink);
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
            color: var(--text-dark);
        }

        button:hover {
            background-color: var(--accent-pink);
            color: white;
            transform: translateY(-3px);
        }

        #ai-response {
            margin-top: 30px;
            padding: 25px;
            background: white;
            border-radius: 20px;
            min-height: 60px;
            display: none;
            border: 2px solid var(--sand-pink);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .unity-section {
            margin-top: 60px;
            text-align: center;
        }

        .unity-section img {
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        audio { margin-top: 20px; width: 100%; max-width: 300px; }
    </style>
</head>
<body>

    <header>
        <h1>🍒 Привіт! Я твій AI-помічник 😎</h1>
    </header>

    <div class="container">
        <p class="intro-text">
            Відчуй момент тут і зараз. Ми поруч, щоб підтримати тебе.
        </p>

        <div class="character-container">
            <img src="https://st2.depositphotos.com/18722762/50790/v/450/depositphotos_507904706-stock-illustration-relax-yoga-crossed-legs-closed.jpg" alt="Релакс">
        </div>

        <div class="buttons-grid">
            <button onclick="respond('stress')">Мені тривожно 😰</button>
            <button onclick="respond('tired')">Я дуже втомився/лася 😴</button>
            <button onclick="respond('sad')">Мені сумно 😔</button>
            <button onclick="respond('happy')">Хочу поділитися радістю! ✨</button>
        </div>

        <div id="ai-response"></div>

        <!-- Нова секція Антистрес -->
        <div class="antistress-box">
            <h3>Твій маленький стрес, який ти заспокоїш:</h3>
            <p>Клікай на фігуру, щоб змінити її форму та розслабитися</p>
            <div id="antistress-toy" class="shape-1" onclick="changeShape()">АНТИСТРЕС</div>
        </div>

        <div class="unity-section">
            <h3>Ми всі єдині у цьому світі 🤝</h3>
            <img src="https://img.freepik.com/free-vector/people-holding-hands-together-unity-world-peace-concept_53876-64663.jpg" alt="Єдність">
        </div>

        <div style="margin-top: 40px;">
            <p style="font-size: 14px; font-weight: bold;">🎵 Музика для гарного настрою:</p>
            <audio id="bg-music" controls loop>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <div style="padding: 20px;">
        <img src="https://hitscounter.dev/api/hit?url=https%3A%2F%2Fvilnyy-hub.github.io%2Fit%2F1%2Fsoliabeyourself.html&label=%D0%A2%D1%96%2C%D1%89%D0%BE+%D1%81%D1%82%D0%B0%D0%BB%D0%B8+%D1%82%D1%80%D0%BE%D1%88%D0%BA%D0%B8+%D1%81%D0%BF%D0%BE%D0%BA%D1%96%D0%B9%D0%BD%D1%96%D1%88%D0%B8%D0%BC%D0%B8&icon=bookmark-heart-fill&color=%23ff6bab&style=plastic">
    </div>

    <script>
        // Більші краплі дощу
        function createRain() {
            const rainDuration = 5000;
            const endTimestamp = Date.now() + rainDuration;

            const interval = setInterval(() => {
                if (Date.now() > endTimestamp) {
                    clearInterval(interval);
                    return;
                }
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (Math.random() * 1.5 + 0.8) + 's';
                document.body.appendChild(drop);

                setTimeout(() => drop.remove(), 2500);
            }, 70);
        }

        window.onload = createRain;

        // Зміна форми антистресу
        let currentShape = 1;
        function changeShape() {
            const toy = document.getElementById('antistress-toy');
            toy.classList.remove(`shape-${currentShape}`);
            currentShape = currentShape >= 4 ? 1 : currentShape + 1;
            toy.classList.add(`shape-${currentShape}`);
            
            // Випадковий колір при зміні
            const colors = ['var(--sand-pink)', 'var(--sand-yellow)', '#ffd1dc', '#fff9c4'];
            toy.style.background = colors[Math.floor(Math.random() * colors.length)];
        }

        function respond(situation) {
            const box = document.getElementById('ai-response');
            box.style.display = 'block';
            
            const responses = {
                stress: [
                    "Я поруч. Давай зробимо глибокий вдих... і повільний видих. Ти сильніший/а за цей момент.",
                    "Все гаразд. Давай просто порахуємо до десяти разом. Один... два... три... відчуваєш, як стає легше?",
                    "Зроби ковток води і подивись у вікно. Світ великий, і ти в безпеці. Я з тобою.",
                    "Уяви, що твоя тривога — це маленька хмарка, яка просто пропливає повз. Вона не залишиться назавжди.",
                    "Ти робиш усе, що можеш, і цього достатньо. Дозволь собі просто бути."
                ],
                tired: [
                    "Ти сьогодні зробив/ла дуже багато. Твоє тіло просить відпочинку, і це — твоє право. Відпочинь.",
                    "Відпочинок — це паливо для нових перемог. Закрий очі на хвилину, я постережу за твоїм спокоєм.",
                    "Світ зачекає, поки ти відновлюєш сили. Ти молодець, що піклуєшся про себе.",
                    "Уяви себе на березі теплого океану. Хвилі м'яко забирають твою втому. Спи або просто лежи.",
                    "Твоя енергія обов'язково повернеться, а зараз — час для тиші та затишку."
                ],
                sad: [
                    "Сумувати — це нормально. Це частина нашого життя. Я тут, щоб просто побути з тобою поруч.",
                    "Дозволь собі цей смуток, але пам'ятай: ти сонечко, яке зараз просто сховалося за хмаринку.",
                    "Я обіймаю тебе ментально. Крок за кроком все стане зрозумілішим і легшим. Ти не один/одна.",
                    "Напиши на папері все, що тебе засмучує, а потім просто викинь його. Стане трохи легше, обіцяю.",
                    "Кожна сльоза робить серце м'якшим, а після найтемнішої ночі завжди приходить світанок."
                ],
                happy: [
                    "Я так щиро радію за тебе! Твоя енергія просто неймовірна, вона заряджає все навколо!",
                    "Це чудово! Запам'ятай це відчуття тепла всередині. Ти заслуговуєш на це щастя!",
                    "Твоя усмішка — це найкраще, що сталося за сьогодні. Поділися цією радістю з кимось близьким!",
                    "Неймовірні новини! Нехай цей успіх стане лише початком великої та світлої подорожі.",
                    "Ти сяєш! Дякую, що ділишся цим світлом зі мною. Продовжуй у тому ж дусі!"
                ]
            };
            
            const options = responses[situation];
            const randomMessage = options[Math.floor(Math.random() * options.length)];
            box.innerHTML = "<strong>🤍 Порада для тебе:</strong> " + randomMessage;
        }

        // Автозапуск музики після першого кліку
        document.body.addEventListener('click', function() {
            const music = document.getElementById('bg-music');
            if (music.paused) {
                music.play().catch(e => console.log("Музика завантажується..."));
            }
        }, { once: true });
    </script>
</body>
</html>
