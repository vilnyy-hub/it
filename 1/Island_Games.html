<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Monkey Island Games 🏝️</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; background: linear-gradient(180deg, #4fc3f7 0%, #29b6f6 70%, #ffd54f 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; transition: 0.8s; }
        
        /* Ефект хитання */
        body.party-mode { background: radial-gradient(circle, #2c003e 0%, #000000 100%); animation: shake 2s infinite ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(1deg); }
            75% { transform: rotate(-1deg); }
        }

        .decoration { position: fixed; font-size: 80px; z-index: 1; cursor: pointer; transition: 0.2s; }
        .palm-l { bottom: 20px; left: 20px; }
        .palm-r { bottom: 20px; right: 20px; }
        
        .island-card { background: rgba(255, 253, 231, 0.95); padding: 25px; border-radius: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); max-width: 500px; width: 95%; text-align: center; border: 6px solid #fbc02d; z-index: 10; position: relative; transition: 0.5s; }
        
        /* Неонові ліхтарики */
        body.party-mode .island-card { background: #111; border-color: #0ff; color: #fff; box-shadow: 0 0 50px #0ff, 0 0 100px #0ff; }
        
        .game-screen { display: none; margin-top: 15px; }
        .active { display: block; }
        button { background: #fbc02d; border: none; padding: 10px 18px; font-size: 16px; font-weight: bold; border-radius: 20px; cursor: pointer; margin: 5px; transition: 0.2s; }
        body.party-mode button { background: #f0f; color: #fff; box-shadow: 0 0 10px #f0f; }
        button:hover { transform: scale(1.1); }
        
        #monkey-area { width: 100%; height: 200px; background: #e1f5fe; border-radius: 20px; position: relative; overflow: hidden; border: 2px solid #81d4fa; cursor: crosshair; }
        .target { position: absolute; font-size: 40px; cursor: pointer; transition: opacity 0.3s; }
        #gameCanvas { background: #f0f0f0; border-radius: 10px; border-bottom: 3px solid #555; }
        
        .secret-footer { position: fixed; bottom: 5px; right: 5px; font-size: 8px; color: rgba(0,0,0,0.3); cursor: pointer; }
    </style>
</head>
<body>

<div class="decoration palm-l" onclick="shakeTree()">🌴</div>
<div class="decoration palm-r" onclick="shakeTree()">🌴</div>
<div class="secret-footer" onclick="alert('Підказка: 9999')">9999</div>

<div class="island-card">
    <h1 id="title" onclick="triggerEasterEgg()" style="cursor: pointer;">Paradise Games 🏝️</h1>
    <div style="font-size: 22px; font-weight: bold;">Золото: <span id="balance">0</span> 🪙</div>
    
    <div id="menu" class="game-screen active">
        <button onclick="toggleParty()">НЕОНОВА НІЧ 🌌</button><br>
        <button onclick="showGame('clicker')">💰 Клікер</button>
        <button onclick="showGame('wheel')">🎡 Рулетка</button><br>
        <button onclick="startDinoGame()">🏃 Beach Run</button>
        <button onclick="startMonkeyGame()">🐒 Скарби Мавпи</button>
        <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #ddd;">
            <input type="text" id="secretCode" placeholder="Секретний код" style="padding: 8px; border-radius: 10px;">
            <button onclick="checkSecret()">Ввести</button>
        </div>
    </div>

    <div id="dino" class="game-screen">
        <canvas id="gameCanvas" width="400" height="150"></canvas>
        <p>Пробіл для стрибка!</p>
        <button onmousedown="jump()">СТРИБОК</button>
        <button onclick="stopDinoGame()">Вийти</button>
    </div>

    <div id="monkey" class="game-screen">
        <div id="monkey-area"></div>
        <button onclick="stopMonkeyGame()">Вийти</button>
    </div>

    <div id="clicker" class="game-screen">
        <button style="background:none; font-size: 80px;" onclick="addMoney(10)">💰</button><br>
        <button onclick="showGame('menu')">Назад</button>
    </div>

    <div id="wheel" class="game-screen">
        <div style="font-size: 60px;">🎰</div>
        <button onclick="spinWheel()">СПІН (100$)</button><br>
        <button onclick="showGame('menu')">Назад</button>
    </div>
</div>

<script>
    let gold = 0, usedCodes = {}, clicks = 0;
    let monkeyTimer, isPlaying = false, crabY = 120, jumpSpeed = 0, isJumping = false, obstacleX = 400, score = 0;
    const secretRewards = { '1007': 500, '7777': 1000, '2026': 200, 'BANANA': 150, '9999': 2500 };

    function addMoney(n) { gold = Math.max(0, gold + n); document.getElementById('balance').innerText = gold; }
    function showGame(id) { document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function toggleParty() { document.body.classList.toggle('party-mode'); }

    function checkSecret() {
        const input = document.getElementById('secretCode').value.toUpperCase();
        if (usedCodes[input]) alert("Вже використано!");
        else if (secretRewards[input]) {
            addMoney(secretRewards[input]);
            alert("Бонус отримано: +" + secretRewards[input]);
            usedCodes[input] = true;
        } else alert("Невірний код!");
    }

    function startMonkeyGame() { showGame('monkey'); monkeyTimer = setInterval(spawnTarget, 800); }
    function stopMonkeyGame() { clearInterval(monkeyTimer); document.getElementById('monkey-area').innerHTML = ''; showGame('menu'); }
    function spawnTarget() {
        const area = document.getElementById('monkey-area');
        const target = document.createElement('div');
        const items = ['🍌', '💰', '💣'];
        target.className = 'target';
        target.innerText = items[Math.floor(Math.random() * items.length)];
        target.style.left = Math.random() * (area.clientWidth - 40) + 'px';
        target.style.top = Math.random() * (area.clientHeight - 40) + 'px';
        target.onclick = function() {
            if (target.innerText === '💣') addMoney(-50);
            else addMoney(20);
            target.remove();
        };
        area.appendChild(target);
        setTimeout(() => { if(target.parentElement) target.remove(); }, 1500);
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    function startDinoGame() { showGame('dino'); isPlaying = true; score = 0; obstacleX = 400; requestAnimationFrame(gameLoop); }
    function stopDinoGame() { isPlaying = false; showGame('menu'); }
    function jump() { if (!isJumping) { jumpSpeed = -12; isJumping = true; } }
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') jump(); });
    function gameLoop() {
        if (!isPlaying) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (isJumping) { crabY += jumpSpeed; jumpSpeed += 0.8; if (crabY >= 120) { crabY = 120; isJumping = false; } }
        ctx.font = "30px Arial"; ctx.fillText("🦀", 20, crabY);
        obstacleX -= 6; ctx.fillText("🌵", obstacleX, 130);
        if (obstacleX < -20) { obstacleX = 400; score += 10; addMoney(5); }
        if (obstacleX > 10 && obstacleX < 40 && crabY > 100) { alert("Game Over! Код 1007"); stopDinoGame(); }
        requestAnimationFrame(gameLoop);
    }

    function spinWheel() {
        if(gold < 100) return alert("Мало золота!");
        addMoney(-100);
        setTimeout(() => {
            const chance = Math.random();
            if (chance < 0.2) { 
                let stolen = Math.floor(gold / 2);
                addMoney(-stolen);
                alert("🏴‍☠️ ПІРАТ! Він викрав " + stolen + " золота!");
            } else if (chance < 0.6) { 
                addMoney(300);
                alert("Виграш! +300. Секретний код: 7777");
            } else { 
                alert("Рулетка порожня...");
            }
        }, 500);
    }

    function triggerEasterEgg() { clicks++; if(clicks===5) { addMoney(777); alert("Бонус 777!"); clicks=0; } }
    function shakeTree() { if(Math.random() > 0.5) { addMoney(20); alert("Кокос! +20"); } }
</script>
</body>
</html>
