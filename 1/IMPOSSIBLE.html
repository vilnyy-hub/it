<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>ХИТРИЙ УЛОВКА: IMPOSSIBLE 😈</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    text-align: center;
    background: linear-gradient(135deg, #141e30, #ff004c);
    color: white;
    overflow: hidden;
}

h1 {
    margin-top: 15px;
}

.screen {
    padding: 20px;
}

/* кнопки */
button {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    margin: 5px;
    transition: 0.2s;
}

/* ХИТРА кнопка */
#runBtn {
    position: absolute;
}

/* memory */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 80px);
    gap: 10px;
    justify-content: center;
    margin-top: 10px;
}

.box {
    width: 80px;
    height: 80px;
    background: white;
    opacity: 0.8;
    border-radius: 10px;
    cursor: pointer;
}

.hidden {
    background: transparent;
}

/* fake shake */
.shake {
    animation: shake 0.2s infinite;
}

@keyframes shake {
    0% { transform: translate(1px, 1px); }
    50% { transform: translate(-1px, -2px); }
    100% { transform: translate(1px, 2px); }
}
</style>
</head>

<body>

<h1>😈 ХИТРИЙ УЛОВКА: IMPOSSIBLE MODE</h1>

<p id="msg">Ти точно не пройдеш це 😏</p>

---

# 🪤 1. НЕМожлива кнопка
<div class="screen">
<button id="runBtn" onmouseover="runAway()">СПРОБУЙ НАЖАТИ</button>
</div>

---

# 🧠 2. ПАМ’ЯТЬ (обман)
<div class="screen">
<p>Запам’ятай і натисни всі білі квадрати</p>
<div class="grid" id="grid"></div>
<button onclick="startMemory()">СТАРТ</button>
</div>

---

# 🎲 3. РУЛЕТКА УДАЧІ
<div class="screen">
<button onclick="roulette()">КРУТИТИ РУЛЕТКУ</button>
<p id="luck"></p>
</div>

---

# 💀 4. ХИТРИЙ РЕЖИМ
<div class="screen">
<button onclick="fakeMode()">АКТИВУВАТИ СЕКРЕТ</button>
</div>

<script>

// 🪤 КНОПКА, ЩО ТІКАЄ
function runAway() {
    let btn = document.getElementById("runBtn");

    btn.style.left = Math.random() * window.innerWidth + "px";
    btn.style.top = Math.random() * window.innerHeight + "px";
}

// 🧠 MEMORY GAME
let correct = [];

function startMemory() {
    let grid = document.getElementById("grid");
    grid.innerHTML = "";
    correct = [];

    for (let i = 0; i < 9; i++) {
        let box = document.createElement("div");
        box.classList.add("box");

        if (Math.random() > 0.6) {
            box.dataset.correct = "1";
            correct.push(box);
        }

        box.onclick = function () {
            if (box.dataset.correct) {
                box.style.background = "lime";
            } else {
                box.style.background = "red";
            }
        };

        grid.appendChild(box);
    }

    // все ховається через 1.5 сек
    setTimeout(() => {
        document.querySelectorAll(".box").forEach(b => {
            b.classList.add("hidden");
        });
    }, 1500);
}

// 🎲 ROULETTE (обман)
function roulette() {
    let arr = [
        "🎉 ТИ ПЕРЕМІГ... ні 😏",
        "❌ програш",
        "😈 майже",
        "💀 спробуй ще",
        "🔥 удача фейк"
    ];

    document.getElementById("luck").innerText =
        arr[Math.floor(Math.random() * arr.length)];
}

// 💀 FAKE MODE
function fakeMode() {
    document.body.classList.add("shake");

    setTimeout(() => {
        document.body.classList.remove("shake");
        alert("😈 система обману активована");
    }, 2000);
}

</script>

</body>
</html>
