<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shtrusdel - Яблучко</title>
    <style>
        /* Основні стилі */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            transition: transform 0.3s ease;
        }

        h1 {
            color: #d32f2f;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        p {
            font-style: italic;
            color: #666;
            margin-bottom: 1.5rem;
        }

        /* Стилізація зображення */
        .apple-img {
            width: 200px;
            height: auto;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .apple-img:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .apple-img:active {
            transform: scale(0.9);
        }

        /* Лічильник відвідувань */
        .counter {
            margin-top: 20px;
            opacity: 0.8;
        }

        /* Кнопка для JS */
        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍎 Яблучко</h1>
        <p id="quote">паяльнік, ммм нє? Юраа, дата придата</p>
        
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSYQRvm0q2VWtUmzRm0lah8xUUGArlqQM-RCw&s"
             alt="Штрудель" 
             class="apple-img" 
             id="main-apple">

        <br>
        <button onclick="changeColor()">Змінити настрій</button>

        <div class="counter">
            <img src="https://hitscounter.dev/api/hit?url=https%3A%2F%2Fvilnyy-hub.github.io%2Fit%2F1%2Fjabluchko.html&label=&icon=dice-4&color=%239eeaf9&message=&style=flat&tz=UTC" alt="hits">
        </div>
    </div>

    <script>
        // Функція для зміни кольору заголовка
        function changeColor() {
            const colors = ['#d32f2f', '#388e3c', '#1976d2', '#fbc02d', '#7b1fa2'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.querySelector('h1').style.color = randomColor;
        }

        // Клік на картинку викликає повідомлення
        const apple = document.getElementById('main-apple');
        apple.addEventListener('click', function() {
            alert('Юрааа, це ж штрудель! Дата придата на 100%!');
        });

        // Консольне привітання
        console.log("Сайт 'Штрудель' успішно завантажено. Привіт Юрі!");
    </script>

</body>
</html>
