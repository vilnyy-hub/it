<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shtrusdel Mood 2.0 - Game Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --primary-color: #ff4757;
            --secondary-color: #2ed573;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            color: #2f3542;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Стилі гри */
        #game-zone {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 250px;
            background: rgba(255, 255, 255, 0.4);
            border: 2px dashed var(--primary-color);
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            cursor: crosshair;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-apple {
            position: absolute;
            font-size: 30px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            animation: popIn 0.3s ease-out;
        }

        .game-apple:active { transform: scale(1.5); }

        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .stats {
            display: flex;
            gap: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #2f3542;
        }

        /* Основний інтерфейс */
        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            padding: 1.5rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            max-width: 450px;
            width: 100%;
            margin-bottom: 20px;
        }

        h1 { color: var(--primary-color); font-weight: 900; margin: 0; font-size: 1.8rem; }

        .mood-box {
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
        }

        .mood-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .btn-mood {
            border: 2px solid transparent;
            padding: 10px 5px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            transition: all 0.2s ease;
            background: #f1f2f6;
        }

        .btn-mood.active {
            background: var(--primary-color);
            color: white;
            transform: scale(1.05);
        }

        #mood-result {
            margin-top: 20px;
            display: none;
            animation: bounceIn 0.6s ease;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .mood-img {
            width: 150px; height: 150px;
            object-fit: cover;
            border-radius: 20px;
            border: 4px solid var(--primary-color);
            margin-bottom: 10px;
        }

        .btn-start {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4);
        }

        .btn-start:disabled { background: #ccc; box-shadow: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍎 Shtrusdel Mood 2.0</h1>
        <p style="margin: 5px 0;">Юра, збери яблука за 20 секунд!</p>
        <img src="https://i.kymcdn.com/photos/images/original/003/119/865/cc6.jpeg">


        <div class="stats">
            <span>Час: <span id="timer">20</span>с</span>
            <span>Рахунок: <span id="score">0</span></span>
        </div>
        
        <button class="btn-start" id="start-btn" onclick="startGame()">ПОЧАТИ ГРУ</button>
    </div>

    <!-- Ігрова зона -->
    <div id="game-zone">
        <span id="game-msg">Натисніть "Почати", щоб ловити яблука!</span>
    </div>

    <div class="mood-box">
        <div class="mood-buttons" id="btn-container">
            <button class="btn-mood" onclick="toggleMood('sad')">😢 Сумний</button>
            <button class="btn-mood" onclick="toggleMood('romantic')">💖 Романтик</button>
            <button class="btn-mood" onclick="toggleMood('happy')">🤩 Радісний</button>
            <button class="btn-mood" onclick="toggleMood('angry')">🤬 Злий</button>
            <button class="btn-mood" onclick="toggleMood('hungry')">🤤 Голодний</button>
            <button class="btn-mood" onclick="toggleMood('tired')">💤 Втомлений</button>
            <button class="btn-mood" onclick="toggleMood('creative')">💡 Творчий</button>
        </div>

        <div id="mood-result">
            <img id="res-img" class="mood-img" src="" alt="apple">
            <h3 id="res-name" style="margin: 5px 0;"></h3>
            <p id="res-desc" style="font-size: 0.9rem; color: #57606f;"></p>
            <button onclick="resetSelection()" style="background: none; border: none; color: #a4b0be; cursor: pointer; text-decoration: underline; font-size: 0.8rem;">Скинути вибір</button>
        </div>
    </div>

    <script>
        // --- ЛОГІКА ГРИ ---
        let score = 0;
        let timeLeft = 20;
        let gameActive = false;
        let gameTimer;
        let appleInterval;

        function startGame() {
            score = 0;
            timeLeft = 20;
            gameActive = true;
            document.getElementById('score').innerText = score;
            document.getElementById('timer').innerText = timeLeft;
            document.getElementById('start-btn').disabled = true;
            document.getElementById('game-msg').style.display = 'none';
            
            // Очищення зони
            const zone = document.getElementById('game-zone');
            zone.querySelectorAll('.game-apple').forEach(a => a.remove());

            // Таймер зворотного відліку
            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);

            // Поява яблук
            appleInterval = setInterval(spawnApple, 600);
        }

        function spawnApple() {
            if (!gameActive) return;
            const zone = document.getElementById('game-zone');
            const apple = document.createElement('div');
            apple.className = 'game-apple';
            apple.innerText = '🍎';
            
            // Випадкова позиція
            const x = Math.random() * (zone.offsetWidth - 40);
            const y = Math.random() * (zone.offsetHeight - 40);
            
            apple.style.left = x + 'px';
            apple.style.top = y + 'px';
            
            apple.onclick = (e) => {
                e.stopPropagation();
                score++;
                document.getElementById('score').innerText = score;
                apple.remove();
            };

            zone.appendChild(apple);

            // Яблуко зникає саме через 1.2 сек, якщо не клікнути
            setTimeout(() => { if(apple) apple.remove(); }, 1200);
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameTimer);
            clearInterval(appleInterval);
            document.getElementById('start-btn').disabled = false;
            document.getElementById('game-msg').style.display = 'block';
            document.getElementById('game-msg').innerText = `Гру закінчено! Твій результат: ${score}`;
            alert(`Ти зібрала ${score} яблук! 🍎`);
        }

        // --- ЛОГІКА НАСТРОЮ (Твій попередній код) ---
        let selectedMoods = [];
        const baseMoods = {
            sad: { name: "Симиренко", desc: "Класика для роздумів.", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ71CKG7gx89U7g_IWzCoNtUlgsxGFIpCxYCg&s" },
            romantic: { name: "Рожева Леді", desc: "Для ніжних моментів.", img: "https://tse4.mm.bing.net/th/id/OIP.deFBGT4I7hls0q9R7WP8agHaE8?r=0&rs=1&pid=ImgDetMain&o=7&rm=3" },
            happy: { name: "Голден Делішес", desc: "Сяє як сонце!", img: "https://tse4.mm.bing.net/th/id/OIP.gR1_YAAC8My6bsWVsWGRvgHaHa?r=0&rs=1&pid=ImgDetMain&o=7&rm=3" },
            angry: { name: "Гренні Сміт", desc: "Кислий вибух енергії!", img: "https://tse4.mm.bing.net/th/id/OIP.JfSgOJ9grcQVkYW6RO5H2wAAAA?r=0&rs=1&pid=ImgDetMain&o=7&rm=3" },
            hungry: { name: "Фуджі", desc: "Ситне і солодке.", img: "https://tse3.mm.bing.net/th/id/OIP.1ah5N_FzqTu2oDKI_AHHnQHaHa?r=0&rs=1&pid=ImgDetMain&o=7&rm=3" },
            tired: { name: "Гала", desc: "М'яке та ненав'язливе.", img: "https://tse3.mm.bing.net/th/id/OIP.pdzSDdjCyt8c8aW306T_hAHaEo?r=0&rs=1&pid=ImgDetMain&o=7&rm=3" },
            creative: { name: "Канзі", desc: "Екзотичний смак для ідей.", img: "https://millionfacts.com.ua/wp-content/uploads/2025/03/TSikavi-fakty-pro-iabluka.jpg" }
        };

        const combinations = {
            "happy+romantic": { name: "Афродіта", desc: "Найсолодший сорт у світі для щасливих закоханих." },
            "sad+tired": { name: "Антонівка", desc: "Старий добрий сорт для спокою." },
            "angry+hungry": { name: "Ред Чіф", desc: "Червоне і міцне, щоб вгамувати злий апетит." },
            "creative+happy": { name: "Айдаред", desc: "Яскраве яблуко для шедеврів." }
        };

        function toggleMood(mood) {
            if (selectedMoods.includes(mood)) {
                selectedMoods = selectedMoods.filter(m => m !== mood);
            } else {
                if (selectedMoods.length >= 2) selectedMoods.shift();
                selectedMoods.push(mood);
            }
            updateButtons();
            if (selectedMoods.length > 0) showResult();
            else document.getElementById('mood-result').style.display = 'none';
        }

        function updateButtons() {
            document.querySelectorAll('.btn-mood').forEach(btn => {
                const m = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
                btn.classList.toggle('active', selectedMoods.includes(m));
            });
        }

        function showResult() {
            const resDiv = document.getElementById('mood-result');
            const nameEl = document.getElementById('res-name');
            const descEl = document.getElementById('res-desc');
            const imgEl = document.getElementById('res-img');

            if (selectedMoods.length === 1) {
                const data = baseMoods[selectedMoods[0]];
                nameEl.innerText = data.name;
                descEl.innerText = data.desc;
                imgEl.src = data.img;
            } else {
                const comboKey = selectedMoods.sort().join('+');
                const data = combinations[comboKey] || { name: "Ренет Симиренка (Mix)", desc: "Унікальний гібрид твоїх емоцій!" };
                nameEl.innerText = data.name;
                descEl.innerText = data.desc;
                imgEl.src = "https://images.unsplash.com/photo-1560806887-1e4cd0b6bccb?w=400";
            }
            resDiv.style.display = 'block';
        }

        function resetSelection() {
            selectedMoods = [];
            updateButtons();
            document.getElementById('mood-result').style.display = 'none';
        }
    </script>
</body>
</html>
