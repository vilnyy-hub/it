<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 Мяу 🐱</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        
        :root { --ocean: #0a3d62; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Comic Neue', cursive;
            background: linear-gradient(to bottom, #0a3d62, #1e90ff);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        .fish-container {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 1; overflow: hidden;
        }
        .fish {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.85;
            animation: swim linear infinite;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }
        @keyframes swim {
            from { transform: translateX(-150px) rotate(0deg); }
            to { transform: translateX(calc(100vw + 150px)) rotate(15deg); }
        }
        .fish.reverse { animation-direction: reverse; }

        .content {
            position: relative; z-index: 2; padding: 20px; text-align: center;
        }
        h1 { font-size: 3.5rem; color: #ffeb3b; text-shadow: 4px 4px 10px rgba(0,0,0,0.5); margin: 20px 0; }
        .greeting { color: #00ff9d; font-size: 2.2rem; margin: 15px 0; text-shadow: 0 0 15px #00ff9d; }
        .subtitle { color: #e91e63; font-size: 1.4rem; margin: 20px 0; }

        img {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            margin: 15px;
            transition: transform 0.4s ease;
            cursor: pointer;
        }
        img:hover { transform: scale(1.08) rotate(3deg); }

        .big-text { font-size: 6rem; color: #ff9800; text-shadow: 0 0 20px #ff5722; margin: 30px 0; }
        .tongue { color: #ff69b4; font-size: 2.8rem; margin: 20px 0; }

        /* МОДАЛЬНЕ ВІКНО — МАКСИМАЛЬНО ВЕЛИКЕ */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 61, 98, 0.98);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .modal-content {
            background: linear-gradient(to bottom, #0a3d62, #1e90ff);
            width: 96vw;
            max-width: 920px;
            height: 97vh;
            border-radius: 25px;
            box-shadow: 0 20px 70px rgba(0,0,0,0.85);
            border: 6px solid #ffeb3b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .modal-header {
            padding: 20px 25px 10px;
            text-align: center;
            position: relative;
            flex-shrink: 0;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 25px;
            font-size: 3.5rem;
            cursor: pointer;
            color: #ffeb3b;
        }
        .modal h2 {
            color: #ffeb3b;
            font-size: 2.3rem;
            margin: 0;
        }
        .facts {
            padding: 15px 32px 40px;
            font-size: 1.32rem;
            line-height: 1.82;
            overflow-y: auto;
            flex-grow: 1;
        }
        .facts p {
            margin-bottom: 26px;
        }
        .facts::-webkit-scrollbar { width: 12px; }
        .facts::-webkit-scrollbar-thumb {
            background: #ffeb3b;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="fish-container" id="fishContainer"></div>
   
    <div class="content">
        <h1>ОГОГО ти прям потужна 🐱</h1>
        <p class="greeting">ПРивІт дЯкуЮ що приЙшОВ/лА нА МІй СаЙТ 💕🐱</p>
       
        <img src="https://hitscounter.dev/api/hit?url=https%3A%2F%2Fvilnyy-hub.github.io%2Fit%2F1%2Fsofi.html&label=&icon=eye&color=%239ec5fe&message=&style=flat&tz=UTC">

        <!-- КАРТИНКА 1 -->
        <img src="https://images.squarespace-cdn.com/content/v1/607f89e638219e13eee71b1e/1684821560422-SD5V37BAG28BURTLIXUQ/michael-sum-LEpfefQf4rU-unsplash.jpg"
             style="width: 320px;" 
             data-title="Котик гріється на сонечку"
             data-fact="1.Коти — живі сонячні годинники: Якщо ти поспостерігаєш за котом протягом дня, то помітиш, що він постійно переходить з місця на місце. Коти безпомилково вираховують, як рухається Земля відносно Сонця, і перелягають точно в ту точку кімнати, куди перемістилася сонячна пляма.<br><br>2.Чому вони не перегріваються: У котів майже немає потових залоз на тілі (вони є тільки на подушечках лапок). Коли кіт лежить на сонці, від перегріву його рятує саме шерсть! Вона працює як термос: взимку утримує тепло, а влітку — захищає шкіру від палючих променів.<br><br>3.Засмага на носі та вухах: Так, коти теж можуть обгоріти на сонці! Особливо це стосується білих котів або котиків із рожевими носиками та вушками. Оскільки шерсть там тонка, сонечко може сильно напекти, тому домашні білі пухнастики іноді навіть потребують спеціального безпечного сонцезахисного крему.">

        <p class="subtitle">Ти потрапив у світ кітиків :)</p>

        <!-- КАРТИНКА 2 -->
        <img src="https://applaws.com/uk/wp-content/uploads/sites/3/2025/06/orange_cat_in_cardboard_box.png"
             style="width: 380px;" 
             data-title="Котик у коробці"
             data-fact="1.Безпека та затишок (власна фортеця): Коти за своєю природою є хижаками, але водночас вони досить маленькі, тому в дикій природі на них теж полювали. Коробка — це ідеальне укриття. Коли кіт сидить у ній, у нього захищені спина і боки, а ворог не підбереться непомітно. Звідти дуже зручно спостерігати за світом і почуватися у повній безпеці.<br><br>2.Зменшення стресу: Вчені навіть проводили дослідження в притулках для тварин. Вони помітили, що коти, яким давали звичайні картонні коробки, набагато швидше звикали до нового місця, менше стресували та охочіше йшли на контакт із людьми. Коробка для них — це такий собі 'антистрес-зонінг'.<br><br>3.Ідеальна засідка: Коти — мисливці, які атакують із засідки. Коробка є чудовим замаскованим пунктом. З неї можна дуже весело і зненацька вистрибнути на чиїсь ноги, іграшкову мишку або на іншого кота, що проходить повз.">

        <!-- КАРТИНКА 3 -->
        <img src="https://cdn.britannica.com/70/234870-050-D4D024BB/Orange-colored-cat-yawns-displaying-teeth.jpg"
             style="width: 380px;" 
             data-title="Зіваючий котик"
             data-fact="1.Генетика дикого хижака: У дикій природі котячі (навіть леви та тигри) витрачають величезну кількість енергії на полювання. Їм потрібно вистежити здобич, тихо підкрастися і зробити блискавичний, потужний стрибок. Сон — це спосіб накопичити якнайбільше сил для такого енергетичного вибуху. Домашньому коту полювати на мишей уже не треба, а от інстинкт 'зберігати енергію' залишився.<br><br>2.Режим 'напівсну' (чуйне дрімання): Близько 70% часу, який кіт проводить із заплющеними очима, — це насправді не глибокий сон, а легка дрімота. Вони контролюють усе навколо: їхні вуха повертаються на кожен шурхіт, а ніс вловлює запахи. Кіт готовий миттєво прокинутися і втекти або напасти, якщо це знадобиться. Глибокий сон (коли вони смішно смикають лапками чи вусами) триває всього по 10–15 хвилин за раз.<br><br>3.Вплив погоди: Коти, як і люди, дуже чутливі до погоди. Якщо на вулиці дощ, хмарно або холодно, твій пухнастик, скоріш за все, спатиме ще довше, ніж зазвичай.">

        <p class="big-text">ААААААААААААААА!!!</p>

        <!-- КАРТИНКА 4 -->
        <img src="https://images.squarespace-cdn.com/content/v1/53d40acae4b00000003f5e7c/d9aebc57-a9d3-4c44-ba26-ea546698f73d/Applesauce+1.jpg?format=jpg"
             style="width: 420px; border-radius: 50%;" 
             data-title="Коти — королі"
             data-fact="1.Відомий британський біолог Джон Бредшоу багато років досліджував поведінку домашніх котів і дійшов приголомшливого висновку: коти не розуміють, що люди — це інший біологічний вид. Для кота ти — просто величезний, дуже добрий і чомусь лисий кіт. Оскільки вони сприймають нас як рівних (або просто як великих співмешканців), вони не збираються підкорятися чи виконувати команди, як це роблять собаки.<br><br>2.Вимогливе нявкання: Коли кіт голосно нявчить біля миски чи зачинених дверей, він не «наказує слузі». Насправді дорослі коти між собою майже ніколи не нявкають — цей звук вони вигадали спеціально для нас. Вони зрозуміли, що люди реагують на цей звуковий сигнал, і просто користуються цим «інструментом», щоб попросити про допомогу.<br><br>3.Подарунки у вигляді мишей чи іграшок: Якщо кіт приносить тобі спійману мишу або свою улюблену плюшеву іграшку, він не «нагороджує підданого». Навпаки, у котячій родині так роблять авторитетні дорослі коти (мами або вожаки), які приносять здобич, щоб навчити молодших або слабших полювати. Тобто кіт у цей момент вважає себе головним піклувальником, а тебе — невмілим кошеням, яке не може саме зловити мишу.">

        <!-- КАРТИНКА 5 -->
        <img src="https://metro.co.uk/wp-content/uploads/2020/05/PRI_150473631-e1588316954238.jpg?quality=90&strip=all"
             style="width: 280px;" 
             data-title="Нічні пригоди"
             data-fact="1.Атака о другій ночі: Ти точно знаєш цей «режим тигидика», коли о другій чи третій ночі в кота всередині прокидається шалений демон, і він починає бігати по стінах, диванах і твоєму обличчю. Біологи кажуть, що це просто скидання накопиченої за 16 годин сну енергії. Коті просто терміново треба розім'ятися, і начхати, що всі сплять!<br><br>2.Поцілунок очима: Якщо кіт дивиться на тебе і дуже повільно мружиться або заплющує очі — це не тому, що він засинає від нудьги. На котячій мові це означає «Я тебе люблю». Якщо ти зробиш так само у відповідь, кіт зрозуміє, що це взаємно. Але якщо ти будеш просто пильно дивитися йому в очі не кліпаючи — він сприйме це як виклик на дуель.<br><br>3.Стрибки-паркур: Коти вміють стрибати на висоту, яка у 5–6 разів перевищує їхній власний зріст. Це все одно, якби людина звичайного зросту змогла одним стрибком залетіти на дах триповерхового будинку!">

        <p class="tongue">язисьок 👅</p>
    </div>

    <!-- Модальне вікно -->
    <div class="modal" id="factModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-close" id="closeModal">×</span>
                <h2 id="modalTitle"></h2>
            </div>
            <div class="facts" id="modalFacts"></div>
        </div>
    </div>

    <script>
        // Рибки + бульбашки
        function createFish() {
            const container = document.getElementById('fishContainer');
            const fishTypes = ['🐟', '🐠', '🐡', '🐬', '🦈'];
            const colors = ['#ffeb3b', '#ff4081', '#00e5ff', '#76ff03', '#e040fb', '#ff9800'];
            for (let i = 0; i < 35; i++) {
                const fish = document.createElement('div');
                fish.className = 'fish';
                fish.textContent = fishTypes[Math.floor(Math.random() * fishTypes.length)];
                fish.style.fontSize = `${Math.random()*2.2 + 1.8}rem`;
                fish.style.color = colors[Math.floor(Math.random() * colors.length)];
                fish.style.top = `${Math.random() * 100}vh`;
                fish.style.left = `-${Math.random() * 100}px`;
                fish.style.animationDuration = `${Math.random() * 25 + 18}s`;
                fish.style.animationDelay = `-${Math.random() * 30}s`;
                if (Math.random() > 0.7) fish.classList.add('reverse');
                container.appendChild(fish);
            }
        }

        function createBubbles() {
            const container = document.getElementById('fishContainer');
            setInterval(() => {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 18 + 8;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.style.left = `${Math.random() * 100}vw`;
                bubble.style.bottom = `-30px`;
                bubble.style.opacity = Math.random() * 0.6 + 0.3;
                container.appendChild(bubble);
                setTimeout(() => bubble.remove(), 9000);
            }, 280);
        }

        window.onload = () => {
            createFish();
            createBubbles();
        };

        // Модальне вікно
        const modal = document.getElementById('factModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalFacts = document.getElementById('modalFacts');
        const closeModalBtn = document.getElementById('closeModal');

        closeModalBtn.addEventListener('click', () => modal.style.display = 'none');
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.style.display = 'none';
        });

        document.querySelectorAll('.content img').forEach(img => {
            if (img.dataset.title) {
                img.addEventListener('click', () => {
                    modalTitle.textContent = img.dataset.title;
                    modalFacts.innerHTML = img.dataset.fact;
                    modal.style.display = 'flex';
                });
            }
        });
    </script>
</body>
</html>
