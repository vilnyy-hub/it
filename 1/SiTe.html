<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>noo dont die youre so pretty aha </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Dancing+Script:wght@700&display=swap');

        :root {
            --hotpink: #ff1493;
            --purple: #c026d3;
            --neon: #00f0ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(45deg, #ff1493, #8b00ff, #00f0ff);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
            font-family: 'Comic Neue', cursive;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 920px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4.8rem;
            text-shadow: 
                0 0 20px #fff,
                4px 4px 0 #000,
                -3px -3px 0 #000;
            margin: 25px 0;
            animation: neonGlow 1.2s infinite alternate;
        }

        .subtitle {
            font-size: 2.9rem;
            color: var(--neon);
            text-shadow: 0 0 15px #00f0ff, 3px 3px 0 #000;
        }

        p {
            font-size: 1.9rem;
            margin: 25px 0;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
        }

        .red-text {
            color: #ff1493;
            font-size: 2.6rem;
            animation: pulse 1.8s infinite;
        }

        img {
            border-radius: 20px;
            box-shadow: 0 0 35px rgba(0, 240, 255, 0.8);
            margin: 25px;
            transition: all 0.4s ease;
            max-width: 100%;
        }

        img:hover {
            transform: scale(1.1) rotate(4deg);
            box-shadow: 0 0 60px rgba(255, 20, 147, 1);
        }

        .music-player {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            padding: 15px 35px;
            border-radius: 50px;
            border: 4px solid var(--neon);
            z-index: 100;
            box-shadow: 0 0 30px #00f0ff;
        }

        .heart, .sparkle {
            position: absolute;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            font-size: 2.2rem;
            animation: floatHeart 7s linear infinite;
        }

        .sparkle {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 15px #fff, 0 0 25px #00f0ff;
            animation: twinkle 0.8s infinite alternate;
        }

        @keyframes floatHeart {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-150px) rotate(720deg); opacity: 0; }
        }

        @keyframes twinkle {
            from { opacity: 0.4; transform: scale(0.6); }
            to { opacity: 1; transform: scale(1.3); }
        }

        @keyframes neonGlow {
            from { text-shadow: 0 0 20px #fff, 0 0 30px #00f0ff; }
            to { text-shadow: 0 0 35px #fff, 0 0 55px #ff1493, 0 0 70px #00f0ff; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.07); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>teehee 😼</h1>
        
        <p class="red-text">hey champ..... 👅👅</p>
        
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTD-AH2TCECGdgGR0oHPlNUXOuaKKZhg45Q1w&s" 
             alt="mcbling girl" width="420">

        <h1 class="subtitle">Ya know, you're super-duper swag</h1>
        <h1 class="subtitle">Never lose your swag twin😋</h1>

        <p>yoohoo!</p>

        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRDbSpVOtCupNwjCj9EOd9VnIv7USzdUNr9dg&s" 
             alt="mcbling vibes" width="480">

        <p class="red-text">P.S. Mind sharing some of your swag please?.. 👅👅</p>

        <img src="https://i.pinimg.com/736x/8f/3d/7a/8f3d7a8f3d7a8f3d7a8f3d7a8f3d7a8f.jpg" 
             alt="y2k mcbling" width="450">

        <p style="font-size: 2.9rem; font-family: 'Dancing Script', cursive; margin: 40px 0;">
            𝓹𝓵𝓮𝓪𝓼𝓮 twin..
        </p>

        <img src="https://hitscounter.dev/api/hit?url=https%3A%2F%2Fvilnyy-hub.github.io%2Fit%2F1%2Fjjbaicons.html&label=wazzaaaaa%F0%9F%98%BC%F0%9F%98%BC&icon=hearts&color=%239eeaf9&message=&style=plastic&tz=UTC">
    </div>

    <!-- Music Player -->
    <div class="music-player">
        <audio id="songAudio" loop>
            <source src="https://cdn.glitch.global/8f8f8f8f-8f8f-8f8f-8f8f-8f8f8f8f8f8f/ayesha-feel-it.mp3" type="audio/mpeg">
        </audio>
        <button onclick="toggleMusic()" style="background:none; border:none; font-size:2.1rem; cursor:pointer; color:white;">
            ▶️ <span id="playText">Feel It - Ayesha Erotica</span>
        </button>
    </div>

    <script>
        // Floating hearts + intense sparkles (1980s bling overload)
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.textContent = ['💖','💗','💓','🩷','✨'][Math.floor(Math.random()*5)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 5 + 6) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 14000);
        }

        function createSparkle() {
            const s = document.createElement('div');
            s.classList.add('sparkle');
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            s.style.animationDuration = (Math.random() * 0.6 + 0.5) + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 1500);
        }

        let isPlaying = false;
        const audio = document.getElementById('songAudio');

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                document.getElementById('playText').textContent = "▶️ Feel It - Ayesha Erotica";
            } else {
                audio.play().catch(() => alert("🎵 Feel It - Ayesha Erotica"));
                document.getElementById('playText').textContent = "⏸️ Feel It";
            }
            isPlaying = !isPlaying;
        }

        window.onload = () => {
            // Багато блискіток по всьому екрану
            setInterval(createSparkle, 45);
            setInterval(createHeart, 280);

            // Burst sparkles
            for (let i = 0; i < 40; i++) {
                setTimeout(createSparkle, i * 30);
            }

            // Click = sparkle explosion
            document.addEventListener('click', (e) => {
                for (let i = 0; i < 18; i++) {
                    const s = document.createElement('div');
                    s.classList.add('sparkle');
                    s.style.left = (e.clientX + (Math.random() * 120 - 60)) + 'px';
                    s.style.top = (e.clientY + (Math.random() * 120 - 60)) + 'px';
                    s.style.animationDuration = '0.6s';
                    document.body.appendChild(s);
                    setTimeout(() => s.remove(), 1000);
                }
            });
        };
    </script>
</body>
</html>
