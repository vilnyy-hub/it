<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>🏴‍☠️ Піратські пригоди</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(#f4f1ea, #d6c7a1);
    margin: 0;
    animation: fadeIn 1.5s ease;
}

.container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
}

h1 {
    color: #2c2c2c;
    animation: floatTitle 3s ease-in-out infinite;
}

.text {
    color: brown;
    font-size: 20px;
    text-align: left;
    opacity: 0;
    animation: slideIn 1s forwards;
}

.text:nth-child(2) { animation-delay: 0.5s; }
.text:nth-child(3) { animation-delay: 1s; }
.text:nth-child(4) { animation-delay: 1.5s; }

.images {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.images img {
    width: 200px;
    border-radius: 50%;
    transition: transform 0.4s, box-shadow 0.4s;
    animation: floatImage 4s ease-in-out infinite;
}

/* hover ефекти */
.images img:hover {
    transform: scale(1.1) rotate(5deg);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* анімації */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideIn {
    from {
        transform: translateX(-50px);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes floatImage {
    0% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0); }
}

@keyframes floatTitle {
    0% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
    100% { transform: translateY(0); }
}
</style>

</head>

<body>
<!-- ===== MODERN FEATURES ===== -->

<!-- BUTTONS -->
<div style="margin-top:20px;">

<button id="themeBtn">
🌙 Тема
</button>

<button onclick="playSound()">
🎵 Звук
</button>

<button onclick="addCoins()">
🪙 Знайти скарб
</button>

</div>

<!-- COINS -->
<h2>
Скарби: <span id="coins">0</span>
</h2>

<!-- AUDIO -->
<audio id="sound">
<source src="https://www.soundjay.com/buttons/sounds/button-09.mp3">
</audio>

<!-- ANIMATED BLOCK -->
<div class="hidden modern-box">
🏴‍☠️ Піратський секретний блок
</div>

<style>

/* smooth scroll */
html{
    scroll-behavior:smooth;
}

/* dark mode */
.dark{
    background:#111 !important;
    color:white !important;
}

/* buttons */
button{
    padding:12px 20px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    margin:5px;
    background:#4dd4ac;
    color:#111;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #4dd4ac;
}

/* glow images */
.images img:hover{
    box-shadow:
    0 0 20px #4dd4ac,
    0 0 40px #4dd4ac;
}

/* animated background */
body{
    background-size:400% 400%;
    animation:bg 12s ease infinite;
}

@keyframes bg{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

/* glass effect */
.modern-box{
    margin:40px auto;
    padding:30px;
    max-width:500px;

    background:rgba(255,255,255,0.1);

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.2);

    border-radius:25px;

    font-size:24px;
}

/* scroll animation */
.hidden{
    opacity:0;
    transform:translateY(40px);
    transition:1s;
}

.show{
    opacity:1;
    transform:translateY(0);
}

/* loading line */
.loader{
    position:fixed;
    top:0;
    left:0;
    width:0%;
    height:4px;
    background:#4dd4ac;
    z-index:999;
    animation:load 3s forwards;
}

@keyframes load{
    to{
        width:100%;
    }
}

/* mobile */
@media(max-width:700px){

    .images{
        flex-direction:column;
        align-items:center;
    }

    .images img{
        width:90%;
    }

    h1{
        font-size:28px;
    }
}
</style>

<!-- LOADING -->
<div class="loader"></div>

<script>

/* dark mode */
const themeBtn = document.getElementById("themeBtn");

themeBtn.onclick = () => {
    document.body.classList.toggle("dark");
}

/* sound */
function playSound(){
    document.getElementById("sound").play();
}

/* coins */
let coins = 0;

function addCoins(){

    coins += Math.floor(Math.random()*100);

    document.getElementById("coins").innerText = coins;
}

/* scroll animation */
const hidden = document.querySelectorAll(".hidden");

window.addEventListener("scroll", () => {

    hidden.forEach(el => {

        const pos = el.getBoundingClientRect().top;

        if(pos < window.innerHeight - 100){

            el.classList.add("show");

        }

    });

});
</script>

<div class="container">

<h1>🏴‍☠️ Вперед до пригод!</h1>

<p class="text">Якщо хочеш стати піратом —</p>
<p class="text">тобі потрібно зібрати команду та знайти корабель!</p>
<p class="text">І тоді ти будеш готовий!</p>

<div class="images">
    <img src="https://www.thoughtco.com/thmb/5bNWFbQIN78gJZdCEy2DSDyqUMg=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/-mayflower-ii-replica-at-sunset--massachusetts--73068552-59c4643ac412440010f73d33.jpg">
    
    <img src="https://cdn.europosters.eu/image/750/187625.jpg">
</div>

</div>

</body>
</html>
</body>

</body>
