<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЛІФТ</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Unbounded:wght@300;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --panel: #111118; --border: #2a2a3a;
    --accent: #c8a96e; --accent2: #7b68ee; --danger: #e05252;
    --success: #52c87a; --text: #d4cfbf; --muted: #6a6878;
    --mono: 'Share Tech Mono', monospace; --display: 'Unbounded', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
  .scanlines { position: fixed; inset: 0; pointer-events: none; z-index: 999; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px); }
  .vignette { position: fixed; inset: 0; pointer-events: none; z-index: 998; background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%); }
  .lift-container { width: min(560px, 96vw); border: 1px solid var(--border); background: var(--panel); position: relative; box-shadow: 0 0 60px rgba(200,169,110,0.08), inset 0 0 80px rgba(0,0,0,0.5); }
  .lift-top { border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; background: #0d0d14; }
  .lift-label { font-family: var(--display); font-size: 11px; font-weight: 300; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; }
  .floor-display { font-family: var(--display); font-size: 32px; font-weight: 700; color: var(--accent); text-shadow: 0 0 20px rgba(200,169,110,0.6); letter-spacing: 0.1em; min-width: 60px; text-align: center; animation: flicker 8s infinite; }
  @keyframes flicker { 0%,97%,100%{opacity:1} 98%{opacity:0.4} 99%{opacity:0.9} }
  .direction-arrow { font-size: 20px; color: var(--muted); transition: color 0.3s, transform 0.3s; }
  .direction-arrow.up { color: var(--success); }
  .direction-arrow.down { color: var(--danger); transform: scaleY(-1); }
  .scene-area { min-height: 220px; padding: 28px 28px 20px; position: relative; }
  .floor-tag { font-size: 10px; letter-spacing: 0.25em; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .floor-tag::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .scene-text { font-size: 14px; line-height: 1.8; color: var(--text); min-height: 100px; white-space: pre-wrap; }
  .scene-text .highlight { color: var(--accent); }
  .scene-text .danger-txt { color: var(--danger); }
  .scene-text .success-txt { color: var(--success); }
  .puzzle-area { margin-top: 20px; padding: 16px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); display: none; }
  .puzzle-area.active { display: block; }
  .puzzle-question { font-size: 13px; color: var(--accent); margin-bottom: 12px; line-height: 1.6; white-space: pre-wrap; }
  .answer-input { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 14px; padding: 6px 0; width: 100%; outline: none; transition: border-color 0.2s; }
  .answer-input:focus { border-color: var(--accent); }
  .answer-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .choices-area { margin-top: 16px; flex-direction: column; gap: 8px; display: none; }
  .choices-area.active { display: flex; }
  .choice-btn { background: transparent; border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 13px; padding: 10px 16px; text-align: left; cursor: pointer; transition: all 0.15s; }
  .choice-btn:hover { border-color: var(--accent); background: rgba(200,169,110,0.05); padding-left: 24px; }
  .choice-btn:active { transform: scale(0.99); }
  .feedback-msg { margin-top: 14px; font-size: 13px; min-height: 20px; line-height: 1.6; }
  .feedback-msg.ok { color: var(--success); }
  .feedback-msg.err { color: var(--danger); }
  .controls { border-top: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; background: #0d0d14; gap: 12px; }
  .btn-main { background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: var(--mono); font-size: 13px; padding: 10px 24px; cursor: pointer; letter-spacing: 0.1em; transition: all 0.2s; flex: 1; }
  .btn-main:hover { background: rgba(200,169,110,0.12); box-shadow: 0 0 16px rgba(200,169,110,0.2); }
  .btn-main:disabled { border-color: var(--border); color: var(--muted); cursor: not-allowed; box-shadow: none; background: transparent; }
  .hp-bar { display: flex; gap: 4px; align-items: center; }
  .hp-dot { width: 8px; height: 8px; border: 1px solid var(--danger); transition: background 0.3s; }
  .hp-dot.filled { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
  .progress-bar-wrap { height: 2px; background: var(--border); overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.6s ease; box-shadow: 0 0 8px var(--accent); }
  .floor-buttons { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; padding: 10px 16px; border-top: 1px solid var(--border); }
  .floor-btn { aspect-ratio: 1; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: var(--mono); font-size: 10px; display: flex; align-items: center; justify-content: center; }
  .floor-btn.visited { border-color: var(--accent2); color: var(--accent2); }
  .floor-btn.current { border-color: var(--accent); color: var(--accent); background: rgba(200,169,110,0.1); box-shadow: 0 0 8px rgba(200,169,110,0.3); }
  .game-over-screen, .win-screen { display: none; position: absolute; inset: 0; background: rgba(10,10,15,0.97); align-items: center; justify-content: center; flex-direction: column; gap: 20px; text-align: center; padding: 40px; z-index: 10; }
  .game-over-screen.show, .win-screen.show { display: flex; }
  .big-text { font-family: var(--display); font-size: 26px; font-weight: 700; letter-spacing: 0.1em; }
  .big-text.red { color: var(--danger); text-shadow: 0 0 30px rgba(224,82,82,0.5); }
  .big-text.gold { color: var(--accent); text-shadow: 0 0 30px rgba(200,169,110,0.5); }
  .sub-text { font-size: 13px; color: var(--muted); line-height: 1.7; max-width: 340px; }
  .status-row { padding: 8px 20px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); }
  .shake { animation: shake 0.4s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="lift-container" id="lift">
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
  <div class="lift-top">
    <div class="lift-label" id="liftLabel">ЛІФТ — 18 ПОВЕРХІВ</div>
    <div class="floor-display" id="floorDisplay">B2</div>
    <div class="direction-arrow up" id="dirArrow">▲</div>
  </div>
  <div class="floor-buttons" id="floorButtons"></div>
  <div class="scene-area">
    <div class="floor-tag" id="floorTag">...</div>
    <div class="scene-text" id="sceneText"></div>
    <div class="puzzle-area" id="puzzleArea">
      <div class="puzzle-question" id="puzzleQ"></div>
      <input class="answer-input" id="answerInput" placeholder="введіть відповідь..." autocomplete="off" spellcheck="false">
      <div class="answer-hint" id="answerHint"></div>
    </div>
    <div class="choices-area" id="choicesArea"></div>
    <div class="feedback-msg" id="feedbackMsg"></div>
  </div>
  <div class="status-row">
    <span id="statusLeft">⚠ АВАРІЙНЕ ЖИВЛЕННЯ</span>
    <div class="hp-bar" id="hpBar"></div>
  </div>
  <div class="controls">
    <button class="btn-main" id="mainBtn" onclick="handleMain()">ДАЛІ</button>
  </div>
  <div class="game-over-screen" id="gameOver">
    <div class="big-text red">ЗАСТРЯГ НАЗАВЖДИ</div>
    <div class="sub-text" id="goMsg">Ліфт зупинився між поверхами. Двері не відчиняться ніколи.</div>
    <button class="btn-main" onclick="restartGame()" style="max-width:200px">СПРОБУВАТИ ЗНОВУ</button>
  </div>
  <div class="win-screen" id="winScreen">
    <div class="big-text gold">ВИ ВИЙШЛИ!</div>
    <div class="sub-text">Двері розчинилися. Сонячне світло. Живі люди. Ліфт позаду закрився з тихим клацанням і більше не рухався ніколи.</div>
    <button class="btn-main" onclick="restartGame()" style="max-width:200px">ГРАТИ ЗНОВУ</button>
  </div>
</div>
<script>
const floors = [
  {
    id:"B2", tag:"ПОВЕРХ B2 — ТЕХНІЧНИЙ ПІДВАЛ",
    type:"story",
    text:`Ліфт смикнувся і завмер.\n\nТемрява. Потім — аварійне освітлення. Червоне.\n\nВи стоїте у металевій коробці 2×2. На табло — <span class="danger-txt">B2</span>. Це нижче підвалу. Такого поверху не існує.\n\nЗа стінками — шум труб. Або дихання.`
  },
  {
    id:"B1", tag:"ПОВЕРХ B1 — ПІДВАЛ",
    type:"choice",
    text:`Двері відкрились на секунду.\n\nВи бачите: порожній підвал, бетонні стіни, один стілець посеред кімнати. На стільці — пальто. Мокре. Хоча надворі сухо.\n\nНа стіні хтось написав крейдою: <span class="highlight">"НЕ ДИВ НА СТЕЛЮ"</span>\n\nДвері починають закриватись.`,
    question:"Що ви робите?",
    choices:[
      {text:"Не дивитись на стелю — поважати попередження", correct:true, feedback:"Ви опустили погляд. Щось там було — але ви цього не бачили. Добре."},
      {text:"Подивитись на стелю — цікавість бере верх", correct:false, feedback:"Там щось є. Воно дивиться у відповідь. Ліфт стрясонуло. -1 ❤", damage:true},
      {text:"Вийти і взяти пальто", correct:false, feedback:"Двері закрились прямо на вашій руці. Болить. -1 ❤", damage:true}
    ]
  },
  {
    id:"1", tag:"ПОВЕРХ 1 — ФОЙЄ",
    type:"puzzle",
    text:`Фойє. Мармурова підлога. Годинник на стіні показує <span class="highlight">13:61</span>.\n\nРецепціоніст сидить за стійкою, не піднімаючи голови. Перед ним — журнал відвідувачів.\n\nВін говорить, не дивлячись: "Назвіть номер кімнати, якщо хочете пройти."\n\nНа стіні — оголошення: <span class="highlight">"Кімната = перший прайм після 10, помножений на 3"</span>`,
    question:"Який номер кімнати?",
    answer:"33",
    hint:"підказка: перше просте число після 10 — це 11",
    successText:'Рецепціоніст підняв голову. У нього не було обличчя. "Проходьте," — сказав він.'
  },
  {
    id:"2", tag:"ПОВЕРХ 2 — ОФІСИ",
    type:"story",
    text:`Відчинені двері. Офіси.\n\nВсі комп'ютери ввімкнені. Порожні крісла. На кожному моніторі — одне слово, набране сотні разів:\n\n<span class="danger-txt">ВИХОДЬ ВИХОДЬ ВИХОДЬ ВИХОДЬ</span>\n\nОдин монітор відрізняється. На ньому: <span class="highlight">"ТИ НЕ ПЕРШИЙ. ТИ НЕ ОСТАННІЙ."</span>\n\n<span class="success-txt">Ліфт закрився і поїхав сам.</span>`
  },
  {
    id:"3", tag:"ПОВЕРХ 3 — АРХІВ",
    type:"puzzle",
    text:`Стелажі з папками до стелі. Запах старого паперу.\n\nОдна папка лежить на підлозі з написом: <span class="highlight">"ВІДКРИЙ МЕНЕ"</span>\n\nВсередині — шифр. Чотири слова, у кожному підкреслена одна буква:\n\n<span class="highlight">вЕликий — стІна — ліфТ — мОре</span>\n\nПід ними: "Складіть слово з підкреслених букв."`,
    question:"Яке слово виходить?",
    answer:"віто",
    hint:"підказка: читайте підкреслені букви по порядку",
    successText:"Папка розсипалась на попіл. Шлях відкрито."
  },
  {
    id:"4", tag:"ПОВЕРХ 4 — ЛІКАРНЯ",
    type:"choice",
    text:`Лікарняний коридор. Каталки. Запах хлору.\n\nМедсестра виходить з-за кута. Не моргає. Дивиться на вас рівно одну хвилину.\n\nПотім протягує шприц і говорить: <span class="danger-txt">"Це допоможе вам не відчувати."</span>`,
    question:"Ваша відповідь?",
    choices:[
      {text:"Відмовитись — вам не потрібна допомога", correct:true, feedback:"Медсестра кивнула і зникла. Ліфт поїхав."},
      {text:"Прийняти — може це справді допоможе", correct:false, feedback:"Стіни поплили. Ви не пам'ятаєте наступні кілька хвилин. -1 ❤", damage:true},
      {text:"Запитати що всередині", correct:false, feedback:'"Забуття," — відповіла вона. Ліфт здригнувся від холоду. -1 ❤', damage:true}
    ]
  },
  {
    id:"5", tag:"ПОВЕРХ 5 — ДЗЕРКАЛА",
    type:"story",
    text:`Весь поверх — дзеркала. Ліфт відкривається у нескінченний коридор відображень.\n\nВи дивитесь на своє відображення.\n\nВоно моргає — хоча ви не моргали.\n\nПотім повільно піднімає руку — хоча ваші руки нерухомі.\n\nВоно відкриває рот. Ви чуєте власний голос: <span class="danger-txt">"Тікай."</span>\n\n<span class="success-txt">Ліфт закриває двері. Ви їдете вгору.</span>`
  },
  {
    id:"6", tag:"ПОВЕРХ 6 — ПРАЛЬНЯ",
    type:"puzzle",
    text:`Пральня. Десятки машин крутяться одночасно. Всередині кожної — тільки біле простирадло.\n\nОдна машина зупинена. На дверцятах — наліпка з числами:\n\n<span class="highlight">1, 1, 2, 3, 5, 8, ?</span>\n\nЩоб відчинити аварійний вихід із кімнати — введіть наступне число.`,
    question:"Яке число далі?",
    answer:"13",
    hint:"підказка: кожне число = сума двох попередніх",
    successText:"Машина відкрилась. Всередині — тільки ключ від ліфта. Ви берете його."
  },
  {
    id:"7", tag:"ПОВЕРХ 7 — БІБЛІОТЕКА",
    type:"choice",
    text:`Величезна бібліотека. Тисячі книг.\n\nВсі книги — про вас. Ваше ім'я на кожній обкладинці. Різні роки видання: минуле, теперішнє і... майбутнє.\n\nОдна книга лежить відкрита. На сторінці — <span class="danger-txt">сьогоднішня дата</span>. І опис цієї миті.\n\nВи бачите наступний абзац — але встигаєте прочитати лише перші слова: <span class="highlight">"Якщо вони обернуться..."</span>`,
    question:"Ви обертаєтесь?",
    choices:[
      {text:"Ні — закрити книгу і не читати далі", correct:true, feedback:"Деякі речі краще не знати. Ліфт мирно їде вгору."},
      {text:"Так — хочу знати своє майбутнє", correct:false, feedback:"Ви бачите щось. Не можете розповісти що. Але тремтите. -1 ❤", damage:true},
      {text:"Взяти книгу з собою", correct:false, feedback:"Книга розсипалась на попіл у ваших руках. Обпекло пальці. -1 ❤", damage:true}
    ]
  },
  {
    id:"8", tag:"ПОВЕРХ 8 — ЇДАЛЬНЯ",
    type:"puzzle",
    text:`Їдальня. Столи накриті на сотні осіб. Їжа ще тепла.\n\nАле нікого немає.\n\nНа одному столі — меню з загадкою замість страв:\n\n<span class="highlight">"Чим більше береш — тим більше лишається. Що це?"</span>\n\nКасир чекає на відповідь.`,
    question:"Ваша відповідь:",
    answer:"яма",
    hint:"підказка: подумайте про землю",
    successText:"Касир відсунувся. За ним — прохід до ліфта."
  },
  {
    id:"9", tag:"ПОВЕРХ 9 — ЗАБОРОНЕНИЙ",
    type:"choice",
    text:`<span class="danger-txt">УВАГА.</span>\n\nЛіфт автоматично зупинився на 9-му поверсі. Кнопки не реагують.\n\nЗ-за дверей — скребіння. Щось важке пересувається по підлозі.\n\nНа панелі з'являється: <span class="highlight">"ВВЕДІТЬ КОД ДОСТУПУ АБО НАТИСНІТЬ АВАРІЙНИЙ ВИКЛИК"</span>\n\nПоряд хтось написав олівцем: <span class="muted">"не відчиняй"</span>`,
    question:"Ваші дії?",
    choices:[
      {text:"Натиснути аварійний виклик і чекати", correct:true, feedback:"Сирена заглушила звуки. Ліфт стрибнув і поїхав вгору."},
      {text:"Спробувати відкрити двері руками", correct:false, feedback:"Щілина. Темрява. Запах. Ви швидко відступаєте. -1 ❤", damage:true},
      {text:"Почекати — може мине само", correct:false, feedback:"Скребіння стало ближче. Потім — тиша. Це гірше. -1 ❤", damage:true}
    ]
  },
  {
    id:"10", tag:"ПОВЕРХ 10 — ДИТЯЧА",
    type:"puzzle",
    text:`Дитяча кімната. Іграшки. Малюнки на стінах.\n\nМ'яч котиться до ліфта сам по собі. На ньому маркером:\n\n<span class="highlight">3, 6, 12, 24, ?</span>\n\nДитячий голос з-за стіни: "Скажи правильно — і я відпущу тебе."`,
    question:"Яке число далі?",
    answer:"48",
    hint:"підказка: кожне число подвоюється",
    successText:"М'яч покотився назад. Голос затих. Ліфт рушив."
  },
  {
    id:"11", tag:"ПОВЕРХ 11 — ХІРУРГІЯ",
    type:"story",
    text:`Операційна. Яскраве біле світло.\n\nНа столі — пацієнт. Накритий простирадлом. Монітор показує рівний пульс.\n\nХірург у масці обертається до вас: <span class="highlight">"Ми чекали. Сідайте."</span>\n\nВи кажете, що помилилися поверхом.\n\nХірург кивнув. <span class="success-txt">"Цього разу,"</span> — відповів він.\n\nЛіфт закрився.`
  },
  {
    id:"12", tag:"ПОВЕРХ 12 — ТЕРАСА",
    type:"choice",
    text:`Несподівано: відкрита тераса. Нічне небо. Зірки.\n\nВи на 12-му поверсі, але горизонт — на рівні очей. Як це можливо?\n\nНа терасі сидить чоловік. Дивиться на небо. Не обертається.\n\nВін каже: <span class="highlight">"Сядь. Поговоримо."</span>\n\nЛіфт за спиною ще відкритий.`,
    question:"Що ви робите?",
    choices:[
      {text:"Сісти і поговорити — перерва не завадить", correct:false, feedback:"Ви сидите. Обертаєтесь — ліфт зник. Двері немає. -1 ❤", damage:true},
      {text:"Увійти в ліфт і їхати далі", correct:true, feedback:"Чоловік не обернувся. 'Наступного разу,' — прошепотів він."},
      {text:"Запитати хто він", correct:false, feedback:"Він обернувся. Ваше обличчя. Ваші очі. -1 ❤", damage:true}
    ]
  },
  {
    id:"13", tag:"ПОВЕРХ 13 — ПОВЕРХ 13",
    type:"puzzle",
    text:`Поверх, якого не існує в жодному будинку.\n\nПустий коридор. Єдина лампочка. Єдині двері з кодовим замком.\n\nНа замку — напис: <span class="highlight">"Я говорю без рота. Чую без вух. Не маю тіла, але оживаю від вітру. Що я?"</span>`,
    question:"Ваша відповідь:",
    answer:"відлуння",
    hint:"підказка: звук, який повертається",
    successText:"Замок клацнув. За дверима — ще один ліфт. Такий самий. Ви входите."
  },
  {
    id:"14", tag:"ПОВЕРХ 14 — СЕРВЕРНА",
    type:"puzzle",
    text:`Серверна кімната. Тисячі мигаючих вогників.\n\nЕкран на стіні: <span class="highlight">ВВЕДІТЬ ПАРОЛЬ ДЛЯ ДЕБЛОКУВАННЯ ЛІФТА</span>\n\nПідказка на стікері: "Пароль = кількість літер у слові ЛІФТ плюс кількість поверхів у цьому будинку."`,
    question:"Що за пароль? (підказка: у цьому будинку 18 поверхів)",
    answer:"22",
    hint:"підказка: ЛІФТ = 4 літери, будинок = 18 поверхів",
    successText:"Системи перезавантажились. Ліфт рушив вгору."
  },
  {
    id:"15", tag:"ПОВЕРХ 15 — КІМНАТА ОЧІКУВАННЯ",
    type:"choice",
    text:`Зала очікування. Пластикові стільці. Журнали з датами з майбутнього.\n\nВсі місця зайняті — але ви нікого не бачите. Лише вм'ятини на сидіннях.\n\nНомерний автомат. Ваш номер: <span class="highlight">∞</span>\n\nТабло показує: <span class="danger-txt">ЗАРАЗ ОБСЛУГОВУЄТЬСЯ: ∞</span>`,
    question:"Що ви робите?",
    choices:[
      {text:"Підійти до вікна обслуговування", correct:false, feedback:"За вікном — дзеркало. Ваше відображення посміхається. Ви — ні. -1 ❤", damage:true},
      {text:"Натиснути кнопку ліфта і поїхати", correct:true, feedback:"Ніхто не заперечив. Можливо, вас тут ніколи й не було."},
      {text:"Сісти і чекати своєї черги", correct:false, feedback:"Ви чекаєте годину. Або день. Час тут не рахується. -1 ❤", damage:true}
    ]
  },
  {
    id:"16", tag:"ПОВЕРХ 16 — ГОРИЩЕ",
    type:"puzzle",
    text:`Горище. Пил. Старі меблі під простирадлами.\n\nПід одним простирадлом — дошка з написами. Математична задача:\n\n<span class="highlight">Якщо ліфт їде зі швидкістю 2 поверхи на хвилину і вам залишилось 2 поверхи — через скільки хвилин ви вийдете?</span>`,
    question:"Ваша відповідь (у хвилинах):",
    answer:"1",
    hint:"підказка: 2 поверхи ÷ 2 поверхи/хв = ?",
    successText:"Правильно. Простирадло впало саме по собі. Під ним — нічого."
  },
  {
    id:"17", tag:"ПОВЕРХ 17 — ОСТАННІЙ КРОК",
    type:"choice",
    text:`Майже вийшли.\n\nДовгий коридор. Вдалині — двері з написом <span class="success-txt">ВИХІД</span>.\n\nАле між вами і виходом стоїть людина. Спиною до вас. Вона чекає.\n\nКоли ви наближаєтесь — вона обертається. Це ви самі. З того дня, коли ввійшли в цей ліфт.\n\n"Ти не можеш вийти," — каже ваше відображення. <span class="highlight">"Ти вже тут назавжди."</span>`,
    question:"Ваша відповідь?",
    choices:[
      {text:"'Ні. Я виходжу.' — і йти крізь нього", correct:true, feedback:"Відображення розчинилось. Двері відкрились. Ви вільні."},
      {text:"Повірити і повернутись до ліфта", correct:false, feedback:"Ліфт повіз вас вниз — на поверх B2. Знову. -1 ❤", damage:true},
      {text:"Спитати як довго ви тут", correct:false, feedback:'"Вічність," — відповіло відображення. І ви відчули це у кістках. -1 ❤', damage:true}
    ],
    isLast: true
  }
];
 
let currentFloor = 0;
let hp = 4;
let floorState = "reading";
let selectedChoice = null;
 
function initHPBar() {
  const bar = document.getElementById("hpBar");
  bar.innerHTML = "";
  for (let i = 0; i < hp; i++) {
    const dot = document.createElement("div");
    dot.className = "hp-dot filled";
    dot.id = "hp-" + i;
    bar.appendChild(dot);
  }
}
 
function updateHPBar() {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById("hp-" + i);
    if (d) d.className = "hp-dot" + (i < hp ? " filled" : "");
  }
}
 
function initFloorButtons() {
  const c = document.getElementById("floorButtons");
  c.innerHTML = "";
  floors.forEach((f, i) => {
    const btn = document.createElement("div");
    btn.className = "floor-btn";
    btn.id = "fbtn-" + i;
    btn.textContent = f.id;
    c.appendChild(btn);
  });
}
 
function updateFloorButtons() {
  floors.forEach((f, i) => {
    const btn = document.getElementById("fbtn-" + i);
    if (!btn) return;
    btn.className = "floor-btn" + (i < currentFloor ? " visited" : "") + (i === currentFloor ? " current" : "");
  });
}
 
function showFloor(idx) {
  const floor = floors[idx];
  floorState = "reading";
  selectedChoice = null;
 
  document.getElementById("floorDisplay").textContent = floor.id;
  document.getElementById("floorTag").textContent = floor.tag;
  document.getElementById("feedbackMsg").textContent = "";
  document.getElementById("feedbackMsg").className = "feedback-msg";
  document.getElementById("sceneText").innerHTML = floor.text;
  document.getElementById("puzzleArea").classList.remove("active");
  document.getElementById("choicesArea").classList.remove("active");
  document.getElementById("answerInput").value = "";
 
  const progress = (idx / (floors.length - 1)) * 100;
  document.getElementById("progressBar").style.width = progress + "%";
 
  const btn = document.getElementById("mainBtn");
  btn.disabled = false;
  btn.textContent = "ДАЛІ";
 
  if (floor.type === "story") {
    floorState = "ready";
  } else if (floor.type === "puzzle") {
    floorState = "needs-puzzle";
    btn.textContent = "РОЗГАДАТИ";
  } else if (floor.type === "choice") {
    floorState = "needs-choice";
    renderChoices(floor);
    document.getElementById("choicesArea").classList.add("active");
    btn.disabled = true;
  }
 
  updateFloorButtons();
}
 
function renderChoices(floor) {
  const area = document.getElementById("choicesArea");
  area.innerHTML = "";
  floor.choices.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = c.text;
    btn.onclick = () => selectChoice(i);
    area.appendChild(btn);
  });
}
 
function selectChoice(idx) {
  selectedChoice = idx;
  document.querySelectorAll(".choice-btn").forEach((b, i) => {
    b.style.borderColor = i === idx ? "var(--accent)" : "var(--border)";
    b.style.background = i === idx ? "rgba(200,169,110,0.08)" : "transparent";
  });
  document.getElementById("mainBtn").disabled = false;
}
 
function takeDamage() {
  hp = Math.max(0, hp - 1);
  updateHPBar();
  document.getElementById("lift").classList.add("shake");
  setTimeout(() => document.getElementById("lift").classList.remove("shake"), 400);
  return hp <= 0;
}
 
function handleMain() {
  const floor = floors[currentFloor];
  const btn = document.getElementById("mainBtn");
  const feedback = document.getElementById("feedbackMsg");
 
  if (floorState === "reading") return;
 
  if (floorState === "ready") {
    if (floor.isLast) { showWin(); return; }
    nextFloor(); return;
  }
 
  if (floorState === "needs-puzzle") {
    document.getElementById("puzzleQ").textContent = floor.question;
    document.getElementById("answerHint").textContent = floor.hint || "";
    document.getElementById("puzzleArea").classList.add("active");
    document.getElementById("answerInput").focus();
    floorState = "puzzle-active";
    btn.textContent = "ПІДТВЕРДИТИ";
    return;
  }
 
  if (floorState === "puzzle-active") {
    const val = document.getElementById("answerInput").value.trim().toLowerCase();
    const answers = floor.answer.toLowerCase().split("|");
    if (answers.includes(val)) {
      feedback.className = "feedback-msg ok";
      feedback.textContent = "✓ " + (floor.successText || "Правильно!");
      floorState = "ready";
      btn.textContent = floor.isLast ? "ВИЙТИ" : "ВГОРУ ▲";
    } else {
      feedback.className = "feedback-msg err";
      feedback.textContent = "✗ Неправильно. Спробуйте ще раз.";
      if (takeDamage()) { setTimeout(showGameOver, 600); }
    }
    return;
  }
 
  if (floorState === "needs-choice") {
    if (selectedChoice === null) return;
    const choice = floor.choices[selectedChoice];
    if (choice.correct) {
      feedback.className = "feedback-msg ok";
      feedback.textContent = "✓ " + choice.feedback;
    } else {
      feedback.className = "feedback-msg err";
      feedback.textContent = "✗ " + choice.feedback;
      if (choice.damage && takeDamage()) { setTimeout(showGameOver, 600); return; }
    }
    floorState = "ready";
    btn.textContent = floor.isLast ? "ВИЙТИ" : "ВГОРУ ▲";
    btn.disabled = false;
    return;
  }
}
 
document.getElementById("answerInput").addEventListener("keydown", e => { if (e.key === "Enter") handleMain(); });
 
function nextFloor() {
  currentFloor++;
  if (currentFloor >= floors.length) { showWin(); return; }
  showFloor(currentFloor);
}
 
function showGameOver() { document.getElementById("gameOver").classList.add("show"); }
function showWin() { document.getElementById("winScreen").classList.add("show"); }
 
function restartGame() {
  currentFloor = 0; hp = 4;
  document.getElementById("gameOver").classList.remove("show");
  document.getElementById("winScreen").classList.remove("show");
  initHPBar(); showFloor(0);
}
 
initHPBar();
initFloorButtons();
showFloor(0);
</script>
