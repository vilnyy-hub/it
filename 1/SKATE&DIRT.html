<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKATE & DIRT | LVIV RIDERS HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main-color: #ffcc00; --bg-color: #0c0c0c; --card-bg: #161616; --text-color: #ffffff; --sub-text: #b0b0b0; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; }

        header { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 5px solid var(--main-color); text-align: center; }
        h1 { font-family: 'Oswald'; font-size: 5rem; text-transform: uppercase; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        .marker-animation { width: 100px; height: 100px; stroke: #ffffff; fill: none; stroke-width: 5; stroke-linecap: round; opacity: 0; transition: opacity 0.3s; stroke-dasharray: 200; stroke-dashoffset: 200; }
        .draw-active { opacity: 1 !important; animation: draw-finish 1s ease-out forwards !important; }
        @keyframes draw-finish { 0% { stroke-dashoffset: 200; } 100% { stroke-dashoffset: 0; } }

        .branching-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .branch-card { height: 350px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid #333; cursor: pointer; transition: 0.4s; background: #111; }
        .branch-card:hover { border-color: var(--main-color); background: #1a1a1a; transform: translateY(-10px); }
        .branch-card h2 { font-family: 'Oswald'; font-size: 5rem; margin: 0; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .card { background: var(--card-bg); padding: 40px 20px; border-radius: 12px; text-align: center; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--main-color); transform: translateY(-5px); }
        .card h3 { font-family: 'Oswald'; font-size: 1.5rem; text-transform: uppercase; margin: 10px 0; }

        .page { display: none; }
        .page.active { display: block; }
        .back-btn { color: var(--main-color); cursor: pointer; margin-bottom: 30px; font-weight: bold; font-family: 'Oswald'; letter-spacing: 2px; }
        
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.98); padding: 50px; overflow-y: auto; z-index: 1000; }
        .modal-content { max-width: 900px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .content-box { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        .full-width { grid-column: span 2; }
        .modal-content h2 { color: var(--main-color); font-family: 'Oswald'; font-size: 2.5rem; text-transform: uppercase; margin-bottom: 20px; }
        .close-btn { color: var(--main-color); font-size: 3rem; cursor: pointer; position: fixed; right: 50px; top: 20px; }
    </style>
</head>
<body>

<header><h1>SKATE & DIRT</h1><p>LVIV RIDERS HUB // 2026</p></header>

<main class="container">
    <section id="selection-screen" class="page active">
        <div class="branching-container">
            <div class="branch-card" onclick="startLoading(this, 'skate')">
                <svg class="marker-animation" viewBox="0 0 100 100"><path d="M10,50 Q50,20 90,50"/><circle cx="25" cy="60" r="8"/><circle cx="75" cy="60" r="8"/></svg>
                <h2>SKATE</h2>
            </div>
            <div class="branch-card" onclick="startLoading(this, 'dirt')">
                <svg class="marker-animation" viewBox="0 0 100 100"><circle cx="20" cy="50" r="15"/><circle cx="80" cy="50" r="15"/><path d="M20,50 L50,30 L80,50 M50,30 L45,15"/></svg>
                <h2>DIRT</h2>
            </div>
        </div>
    </section>

    <section id="content-screen" class="page">
        <div class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> НАЗАД ДО ВИБОРУ</div>
        <h2 id="current-title" style="color:var(--main-color); font-family:'Oswald'; font-size: 4rem; margin: 0 0 30px 0;"></h2>
        <div class="grid">
            <article class="card" onclick="openModal('spots')"><i class="fas fa-map-marked-alt fa-3x" style="color:var(--main-color)"></i><h3>Локації</h3></article>
            <article class="card" onclick="openModal('guides')"><i class="fas fa-graduation-cap fa-3x" style="color:var(--main-color)"></i><h3>Школа</h3></article>
            <article class="card" onclick="openModal('events')"><i class="fas fa-calendar-alt fa-3x" style="color:var(--main-color)"></i><h3>Події</h3></article>
            <article class="card" onclick="openModal('media')"><i class="fab fa-youtube fa-3x" style="color:var(--main-color)"></i><h3>Медіа</h3></article>
            <article class="card" onclick="openModal('shops')"><i class="fas fa-shopping-bag fa-3x" style="color:var(--main-color)"></i><h3>Шопи</h3></article>
            <article class="card" onclick="openModal('slang')"><i class="fas fa-comments fa-3x" style="color:var(--main-color)"></i><h3>Сленг</h3></article>
        </div>
    </section>
</main>

<div id="infoModal" class="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-content" id="modalBody"></div>
</div>

<script>
    const db = {
        skate: { 
            title: "SKATEBOARDING", 
            spots: "<div class='full-width'><h2>Локації</h2></div><div class='content-box'><h3>Порохова Вежа</h3><p>Ідеальне покриття для техніки: відпрацьовуйте 50-50 grind, boardslide, nosegrind та blunt slide на гранітних парапетах.</p></div><div class='content-box'><h3>Площа Митна</h3><p>Високі сходинки для ollie, gap-ів, kickflip-ів та heelflip-ів. Чудовий простір для виконання manual-ів та varial flip-ів.</p></div>", 
            guides: "<div class='full-width'><h2>Скейт-школа</h2></div><div class='content-box'><h3>Фліпи</h3><p>Опануйте kickflip, heelflip, hardflip, 360 flip (tre flip) та laser flip. Важливо правильно «викидати» дошку передньою ногою.</p></div><div class='content-box'><h3>Слайди</h3><p>Вивчіть crooked grind, suski grind, feeble grind та smith grind. Контроль балансу та рівномірний розподіл ваги — ваш ключ до успіху.</p></div>", 
            events: "<div class='full-width'><h2>Події 2026</h2></div><div class='content-box'><h3>Go Skate Day</h3><p>Контести на найкращий tech-line (комбінація з 3+ трюків) та Best Trick на сходах.</p></div><div class='content-box'><h3>Нічні Сесії</h3><p>Вивчення нових combo: revert, body varial, bigspin та shuv-it 360 у нічних умовах на нових спотах.</p></div>", 
            media: "<div class='full-width'><h2>Медіа</h2></div><div class='content-box'><h3>Техніка</h3><p>Дивіться розбори trick tips для виконання: gazelle flip, nightmare flip та impossible. Slow-motion — найкращий спосіб зрозуміти рух стопи.</p></div><div class='content-box'><h3>Стиль</h3><p>Вивчення стильних трюків: late flip, finger flip та wallie. Знімайте себе, щоб бачити, чи вистачає «попу» для чистого виконання.</p></div>", 
            shops: "<div class='full-width'><h2>Скейт-шопи</h2></div><div class='content-box'><h3>Комплектуючі</h3><p>Для складних трюків як tre flip або hardflip обирайте деки з кращим pop-ом та підшипники Bones Swiss для вищої швидкості.</p></div><div class='content-box'><h3>Налаштування</h3><p>Правильна жорсткість бушингів у траках допоможе легше робити carve або стійко приземляти trick-и на вильоті.</p></div>", 
            slang: "<div class='full-width'><h2>Сленг</h2></div><div class='content-box'><h3>Трюки</h3><p><strong>Fakie:</strong> рух назад. <strong>Nollie:</strong> олі з носа. <strong>Switch:</strong> протилежна стійка. <strong>Manual:</strong> баланс на двох колесах.</p></div><div class='content-box'><h3>Терміни</h3><p><strong>Pop:</strong> клацання. <strong>Bail:</strong> невдача. <strong>Stoked:</strong> заряджений на трюк. <strong>Clean:</strong> ідеально приземлений трюк.</p></div>" 
        },
        dirt: { 
            title: "DIRT & MTB", 
            spots: "<div class='full-width'><h2>Локації</h2></div><div class='content-box'><h3>Парк Погулянка</h3><p>Ідеально для: backflip, frontflip, 360, tailwhip та barspin. Велика висота дозволяє вивчити cashroll або cork 720.</p></div><div class='content-box'><h3>Вулька</h3><p>Стежки для тренування: manual, bunny hop, drop (до 2м), перельоти через коріння та круті контрнахили (berms).</p></div>", 
            guides: "<div class='full-width'><h2>Техніка</h2></div><div class='content-box'><h3>Повітряні трюки</h3><p>Почніть з: tuck no-hander, superman seatgrab, toboggan та nac-nac. Це база для впевненого керування байком у польоті.</p></div><div class='content-box'><h3>Складні елементи</h3><p>Вивчайте: decade, bikeflip, cork 360 та flair (на вилеті з рампи). Важливо чітко знати траєкторію приземлення.</p></div>", 
            events: "<div class='full-width'><h2>Змагання</h2></div><div class='content-box'><h3>Lviv Dirt Jam</h3><p>Контест на кращий whip, найвищий стрибок (air amplitude) та виконання найскладнішої комбінації типу backflip-tailwhip.</p></div><div class='content-box'><h3>Whip-Off</h3><p>Змагання на стиль: виконуйте максимальний розворот байка в повітрі та повертайте його назад перед приземленням.</p></div>", 
            media: "<div class='full-width'><h2>Медіа</h2></div><div class='content-box'><h3>Навчання</h3><p>Вивчайте: 360-barspin, x-up, table top та cannonball. Повільна зйомка допоможе проаналізувати момент відриву та положення тіла.</p></div><div class='content-box'><h3>Прогрес</h3><p>Аналізуйте: backflip-barspin, double tailwhip та 720. Слідкуйте за топовими райдерами для розуміння таймінгу в трюках.</p></div>", 
            shops: "<div class='full-width'><h2>Обслуговування</h2></div><div class='content-box'><h3>Деталі</h3><p>Для виконання трюків типу tailwhip або barspin важливо мати довгу гідролінію та надійні ротори. Вчасна заміна покришок гарантує зчеплення.</p></div><div class='content-box'><h3>Налаштування</h3><p>Налаштуйте rebound на вилці для швидкого відскоку після стрибків — це критично для вивчення combo типу backflip-barspin.</p></div>", 
            slang: "<div class='full-width'><h2>Сленг</h2></div><div class='content-box'><h3>Трюки</h3><p><strong>Backflip:</strong> сальто. <strong>Tailwhip:</strong> прокрут рами. <strong>Barspin:</strong> прокрут керма. <strong>Manual:</strong> їзда на одному колесі.</p></div><div class='content-box'><h3>Терміни</h3><p><strong>Drop:</strong> стрибок вниз. <strong>Hardtail:</strong> жорстка рама. <strong>Shaping:</strong> догляд за трасою. <strong>Bail:</strong> падіння.</p></div>" 
        }
    };
    function startLoading(el, t) { const s = el.querySelector('.marker-animation'); s.classList.add('draw-active'); cur = t; setTimeout(() => { document.getElementById('selection-screen').classList.remove('active'); document.getElementById('content-screen').classList.add('active'); document.getElementById('current-title').innerText = db[t].title; s.classList.remove('draw-active'); }, 1000); }
    function goBack() { document.getElementById('content-screen').classList.remove('active'); document.getElementById('selection-screen').classList.add('active'); }
    function openModal(cat) { document.getElementById('infoModal').style.display = 'block'; document.getElementById('modalBody').innerHTML = db[cur][cat]; }
    function closeModal() { document.getElementById('infoModal').style.display = 'none'; }
</script>
</body>
</html>
