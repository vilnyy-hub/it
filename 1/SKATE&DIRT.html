<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKATE & DIRT | LVIV RIDERS HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --main-color: #ffcc00;
            --bg-color: #0c0c0c;
            --card-bg: #161616;
            --text-color: #ffffff;
            --sub-text: #b0b0b0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            line-height: 1.6;
        }

        header {
            height: 45vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(12,12,12,1));
            border-bottom: 5px solid var(--main-color);
            text-align: center;
        }

        h1 { font-family: 'Oswald', sans-serif; font-size: clamp(3rem, 10vw, 5.5rem); margin: 0; text-transform: uppercase; }
        header p { font-size: 1.2rem; color: var(--main-color); letter-spacing: 5px; text-transform: uppercase; }

        .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; min-height: 50vh; }

        /* АНІМАЦІЇ ПЕРЕХОДУ */
        .page {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        .fade-out {
            animation: fadeOut 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }

        #content-screen { display: none; }

        .branching-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .branch-card {
            height: 300px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.3s;
            background: #111;
        }

        .branch-card:hover { border-color: var(--main-color); background: #1a1a1a; transform: translateY(-5px); }
        .branch-card h2 { font-family: 'Oswald'; font-size: 3.5rem; margin: 0; }
        .branch-card span { color: var(--sub-text); font-size: 0.8rem; letter-spacing: 2px; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            color: var(--main-color);
            text-transform: uppercase;
            font-family: 'Oswald';
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .back-btn:hover { opacity: 0.7; transform: translateX(-5px); }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 40px 20px;
            border-radius: 12px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid #222;
            cursor: pointer;
        }

        .card:hover { border-color: var(--main-color); transform: translateY(-5px); }
        .card i { font-size: 2.5rem; color: var(--main-color); margin-bottom: 15px; }
        .card h3 { font-family: 'Oswald'; font-size: 1.4rem; text-transform: uppercase; }

        .modal {
            display: none; position: fixed; z-index: 9999;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
        }
        .modal-content {
            max-width: 850px; margin: 40px auto; padding: 50px;
            background: #0f0f0f; border-left: 5px solid var(--main-color); position: relative;
        }
        .close-btn { position: absolute; right: 25px; top: 15px; font-size: 2.5rem; color: var(--main-color); cursor: pointer; }

        footer { padding: 60px 20px; text-align: center; background: #080808; border-top: 1px solid #222; margin-top: 50px; }
        .social-links a { color: var(--main-color); margin: 0 15px; font-size: 1.8rem; }
    </style>
</head>
<body>

<header>
    <h1>SKATE & DIRT</h1>
    <p>LVIV RIDERS HUB // 2026</p>
</header>

<main class="container">
    <!-- СЛАЙД 1: ВИБІР -->
    <section id="selection-screen" class="page fade-in">
        <nav class="branching-container">
            <div class="branch-card" onclick="goToContent('skate')">
                <span>STREET CULTURE</span>
                <h2>SKATE</h2>
            </div>
            <div class="branch-card" onclick="goToContent('dirt')">
                <span>OFF-ROAD ACTION</span>
                <h2>DIRT</h2>
            </div>
        </nav>
    </section>

    <!-- СЛАЙД 2: КОНТЕНТ -->
    <section id="content-screen" class="page">
        <div class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> ПОВЕРНУТИСЯ</div>
        <h2 id="current-title" style="font-family: 'Oswald'; text-transform: uppercase; margin-bottom: 30px; font-size: 2.5rem; color: var(--main-color);"></h2>
        <div class="grid">
            <article class="card" onclick="openModal('spots')"><i class="fas fa-map-marked-alt"></i><h3>Локації</h3><p>Де сьогодні сесія?</p></article>
            <article class="card" onclick="openModal('guides')"><i class="fas fa-graduation-cap"></i><h3>Школа</h3><p>Гайди на трюки</p></article>
            <article class="card" onclick="openModal('events')"><i class="fas fa-calendar-alt"></i><h3>Події</h3><p>Календар 2026</p></article>
            <article class="card" onclick="openModal('media')"><i class="fab fa-youtube"></i><h3>Медіа</h3><p>Відео та туторіали</p></article>
            <article class="card" onclick="openModal('shops')"><i class="fas fa-shopping-bag"></i><h3>Шопи</h3><p>Магазини стаффу</p></article>
            <article class="card" onclick="openModal('slang')"><i class="fas fa-comments"></i><h3>Сленг</h3><p>Мова ком'юніті</p></article>
        </div>
    </section>
</main>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    let currentDiscipline = '';
    const contentData = {
        skate: { title: "SKATEBOARDING", spots: `<h2>📍 Споти</h2><p>Порохова Вежа, Митна.</p>`, guides: `<h2>🛹 Школа</h2><p>Ollie, Kickflip.</p>`, events: `<h2>📅 Події</h2><p>Go Skate Day.</p>`, media: `<h2>🎥 Медіа</h2><p>Local Edits.</p>`, shops: `<h2>🛒 Шопи</h2><p>Stuff.</p>`, slang: `<h2>🗣️ Сленг</h2><p>Кікфліп.</p>` },
        dirt: { title: "DIRT & MTB", spots: `<h2>📍 Dirt</h2><p>Погулянка.</p>`, guides: `<h2>🚵 MTB</h2><p>Manual.</p>`, events: `<h2>📅 Події</h2><p>Dirt Jam.</p>`, media: `<h2>🎥 Media</h2><p>Tutorials.</p>`, shops: `<h2>🛒 Шопи</h2><p>Bike Service.</p>`, slang: `<h2>🗣️ Сленг</h2><p>Хардтейл.</p>` }
    };

    function goToContent(type) {
        const screen1 = document.getElementById('selection-screen');
        const screen2 = document.getElementById('content-screen');
        
        currentDiscipline = type;
        document.getElementById('current-title').innerText = contentData[type].title;

        // Анімація виходу
        screen1.classList.remove('fade-in');
        screen1.classList.add('fade-out');

        setTimeout(() => {
            screen1.style.display = 'none';
            screen2.style.display = 'block';
            screen2.classList.add('fade-in');
            window.scrollTo(0, 0);
        }, 400); // Час має збігатися з CSS анімацією
    }

    function goBack() {
        const screen1 = document.getElementById('selection-screen');
        const screen2 = document.getElementById('content-screen');

        screen2.classList.remove('fade-in');
        screen2.classList.add('fade-out');

        setTimeout(() => {
            screen2.style.display = 'none';
            screen2.classList.remove('fade-out');
            screen1.style.display = 'block';
            screen1.classList.remove('fade-out');
            screen1.classList.add('fade-in');
            window.scrollTo(0, 0);
        }, 400);
    }

    function openModal(cat) {
        document.getElementById('modalBody').innerHTML = contentData[currentDiscipline][cat];
        document.getElementById('infoModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('infoModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onclick = function(e) { if(e.target == document.getElementById('infoModal')) closeModal(); }
</script>

<footer>
    <div class="social-links">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-telegram"></i></a>
    </div>
    <p>© 2026 RIDERS HUB | LVIV</p>
</footer>

</body>
</html>
