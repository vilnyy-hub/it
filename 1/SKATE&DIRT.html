    function goToContent(type) {
        const screen1 = document.getElementById('selection-screen');
        const screen2 = document.getElementById('content-screen');
        
        currentDiscipline = type;
        document.getElementById('current-title').innerText = contentData[type].title;

        screen1.classList.remove('fade-in');
        screen1.classList.add('fade-out');

        setTimeout(() => {
            screen1.style.display = 'none';
            screen2.style.display = 'block';
            screen2.classList.remove('fade-out');
            screen2.classList.add('fade-in');
            window.scrollTo(0, 0);
        }, 400); 
    }

    function goBack() {
        const screen1 = document.getElementById('selection-screen');
        const screen2 = document.getElementById('content-screen');

        screen2.classList.remove('fade-in');
        screen2.classList.add('fade-out');

        setTimeout(() => {
            screen2.style.display = 'none';
            screen1.style.display = 'block';
            screen1.classList.remove('fade-out');
            screen1.classList.add('fade-in');
            window.scrollTo(0, 0);
        }, 400);
    }

    function openModal(cat) {
        const modal = document.getElementById('infoModal');
        document.getElementById('modalBody').innerHTML = contentData[currentDiscipline][cat];
        
        modal.style.display = 'block';
        setTimeout(() => {
            modal.classList.add('show');
        }, 10);
        
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        const modal = document.getElementById('infoModal');
        modal.classList.remove('show');
        
        setTimeout(() => {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }, 300);
    }

    window.onclick = function(e) { if(e.target == document.getElementById('infoModal')) closeModal(); }

    // СКРИПТ ЛІЧИЛЬНИКА ВІЗИТІВ
    function updateVisitCounter() {
        let visits = localStorage.getItem('site_visits');
        if (!visits) {
            visits = 1;
        } else {
            visits = parseInt(visits) + 1;
        }
        localStorage.setItem('site_visits', visits);
        document.getElementById('count-value').innerText = visits;
    }
    
    // Запуск підрахунку при завантаженні сторінки
    window.onload = function() {
        updateVisitCounter();
    }
</script>
