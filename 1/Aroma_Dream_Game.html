<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aroma Dream Luxury</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
color:white;
background:linear-gradient(135deg,#ffd6f3,#d8c8ff,#c7f0ff);
background-size:400% 400%;
animation:bg 14s ease infinite;
overflow-x:hidden;
min-height:100vh;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.light{
position:fixed;
width:12px;
height:12px;
border-radius:50%;
background:white;
box-shadow:0 0 25px rgba(255,255,255,.9);
pointer-events:none;
animation:fade .8s forwards;
z-index:9999;
}

@keyframes fade{
to{transform:scale(0);opacity:0;}
}

section{
padding:60px 20px;
text-align:center;
}

.glass{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(14px);
border-radius:28px;
max-width:1200px;
margin:auto;
padding:40px;
}

h1{
font-size:70px;
animation:float 4s infinite;
}

@keyframes float{
50%{transform:translateY(-8px);}
}

.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:35px;
}

.card{
width:210px;
background:rgba(255,255,255,0.18);
border-radius:24px;
padding:14px;
}

.card img{
width:100%;
height:240px;
object-fit:cover;
border-radius:18px;
}

button{
padding:13px 24px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff73c8,#9b7cff,#63d4ff);
color:white;
cursor:pointer;
margin-top:15px;
}

.perfume{
position:fixed;
font-size:55px;
cursor:pointer;
z-index:50;
}

.scoreBox{
margin-top:20px;
font-size:30px;
font-weight:bold;
}

.rewardBox{
margin-top:20px;
background:rgba(255,255,255,0.15);
padding:18px;
border-radius:20px;
max-width:420px;
margin:auto;
line-height:1.8;
}

/* popup */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(15px);
text-align:center;
transition:.3s;
width:320px;
}

.popup.show{
transform:translate(-50%,-50%) scale(1);
}

.discount{
font-size:34px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="perfume" id="p">🧴</div>

<!-- COLLECTION -->
<section>
<div class="glass">

<h1>✨ Aroma Dream ✨</h1>

<div class="grid">

<div class="card"><img src="https://images.unsplash.com/photo-1594035910387-fea47794261f"><p>Vanilla Glow 🍦</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1523293182086-7651a899d37f"><p>Rose Luxe 🌹</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1541643600914-78b084683601"><p>Citrus Mist 🍋</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1615634260167-c8cdede054de"><p>Coffee Noir ☕</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1592945403244-b3fbafd7f539"><p>Ocean Drop 🌊</p></div>

</div>

<button onclick="rand()">🎲 Random perfume</button>
<div id="result"></div>

</div>
</section>

<!-- GAME -->
<section>
<div class="glass">

<h2>🎮 Catch the perfume</h2>

<div class="scoreBox">
💎 <span id="score">0</span>
</div>

<div class="rewardBox">
🎁 За 20 очок — секретний подарунок<br>
💖 За 50 очок — секретна знижка
</div>

</div>
</section>

<!-- SECRET -->
<section>
<div class="glass">

<h2>🔒 Secret Code</h2>

<div class="hints">

🍦 sweet perfume<br>
🌸 luxury scent<br>
✨ starts with V<br>
💎 most famous vanilla fragrance

</div>

<br>

<input id="code">
<button onclick="check()">OK</button>

</div>
</section>

<!-- POPUP -->
<div class="popup" id="pop">
<div class="discount" id="text"></div>
</div>

<script>

let p=document.getElementById("p");
let score=0;

function move(){
p.style.left=Math.random()*(innerWidth-100)+"px";
p.style.top=Math.random()*(innerHeight-100)+"px";
}
move();

p.onclick=()=>{

score++;
document.getElementById("score").innerText=score;
move();

if(score===20){
show("🎁 1+1=3 АКЦІЯ");
}

if(score===50){
show("💖 -10% ЗНИЖКА");
}

}

function show(msg){
document.getElementById("text").innerText=msg;
document.getElementById("pop").classList.add("show");

setTimeout(()=>{
document.getElementById("pop").classList.remove("show");
},4000);
}

function rand(){
const perfumes=["Vanilla Glow","Rose Luxe","Citrus Mist","Coffee Noir","Ocean Drop"];
document.getElementById("result").innerText=
perfumes[Math.floor(Math.random()*perfumes.length)];
}

function check(){
let v=document.getElementById("code").value.toLowerCase().trim();

if(v==="vanilla"){
show("💖 SECRET -15% DISCOUNT");
}else{
alert("❌ wrong code");
}
}

</script>

</body>
</html>
