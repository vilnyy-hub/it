<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOFT LEMON HUB 🍋✨</title>
    <style>
        :root {
            --bg-pastel: #fffdf2;     /* Дуже світлий ванільний */
            --card-bg: #ffffff;        /* Чистий білий */
            --lemon-soft: #fff59d;    /* Ніжний пастельний жовтий */
            --lime-soft: #e6ee9c;     /* Пастельний лаймовий */
            --peach-soft: #ffe0b2;    /* Ніжний персиковий */
            --text-muted: #8d8d8d;    /* М'який сірий для тексту */
            --text-main: #5d4037;     /* Теплий коричневий */
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-pastel);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; color: var(--text-main);
        }

        /* --- Естетичний фон --- */
        #bg-rain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .fruit-drop {
            position: absolute; top: -100px;
            opacity: 0.4;
            filter: grayscale(20%);
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(120vh) rotate(360deg); }
        }

        /* --- Меню --- */
        #menu {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 50px;
            border-radius: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
            text-align: center;
        }

        h1 {
            font-size: 36px; margin: 0; color: #fbc02d;
            font-weight: 300; text-transform: lowercase;
            letter-spacing: 4px;
        }

        p { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }

        .btn {
            width: 260px; padding: 18px; margin: 10px;
            border: none; border-radius: 30px;
            font-size: 16px; font-weight: 600;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--text-main);
            display: block;
        }

        .b-lemon { background-color: var(--lemon-soft); }
        .b-lime { background-color: var(--lime-soft); }
        .b-peach { background-color: var(--peach-soft); }
        
        .btn:hover { transform: translateY(-7px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }

        /* --- Гра --- */
        #game-screen {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 100;
            background: var(--bg-pastel);
        }

        #ui {
            position: absolute; top: 40px; width: 100%;
            text-align: center; font-size: 20px;
            color: var(--text-main); z-index: 200;
            letter-spacing: 2px;
        }

        canvas { display: block; filter: saturate(80%); }

        .btn-exit {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); padding: 10px 30px;
            background: white; border: 1px solid #eee; border-radius: 20px;
            cursor: pointer; color: var(--text-muted); font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="bg-rain"></div>

    <div id="menu">
        <div class="container">
            <h1>lemon hub</h1>
            <p>soft & aesthetic games</p>
            <button class="btn b-lemon" onclick="start('shooter')">🎯 ніжний тир</button>
            <button class="btn b-lime" onclick="start('jumper')">🟩 м'який стрибок</button>
            <button class="btn b-peach" onclick="start('catcher')">🧺 теплий кошик</button>
        </div>
    </div>

    <div id="game-screen">
        <div id="ui">рахунок: <span id="score">0</span></div>
        <canvas id="gameCanvas"></canvas>
        <button class="btn-exit" onclick="location.reload()">назад</button>
    </div>

    <script>
        // Дощ із пастельних фруктів
        const rain = document.getElementById('bg-rain');
        const icons = ['🍋', '✨', '☁️', '🍦', '🌸', '🍋‍🟩'];

        function createDrop() {
            const d = document.createElement('div');
            d.className = 'fruit-drop';
            d.innerText = icons[Math.floor(Math.random() * icons.length)];
            d.style.left = Math.random() * 100 + 'vw';
            d.style.fontSize = (Math.random() * 15 + 15) + 'px';
            d.style.animationDuration = (Math.random() * 4 + 6) + 's';
            rain.appendChild(d);
            setTimeout(() => d.remove(), 8000);
        }
        setInterval(createDrop, 500);

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0, active = false;

        function start(mode) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            active = true;
            if(mode === 'shooter') runShooter();
            if(mode === 'jumper') runJumper();
            if(mode === 'catcher') runCatcher();
        }

        function runShooter() {
            let tgts = [];
            setInterval(() => { if(active) tgts.push({x: Math.random()*(canvas.width-100)+50, y: Math.random()*(canvas.height-200)+100})}, 1000);
            canvas.onclick = (e) => {
                tgts.forEach((t, i) => {
                    if(Math.hypot(e.clientX-t.x, e.clientY-t.y) < 50) { tgts.splice(i,1); score++; update(); }
                });
            };
            function loop() {
                if(!active) return;
                ctx.clearRect(0,0,canvas.width, canvas.height);
                ctx.font = "45px Arial";
                tgts.forEach(t => ctx.fillText("🍋", t.x-20, t.y+20));
                requestAnimationFrame(loop);
            }
            loop();
        }

        function runJumper() {
            let y = canvas.height-150, dy = 0, obs = [], frame = 0;
            canvas.onclick = () => { if(y >= canvas.height-150) dy = -13; };
            function loop() {
                if(!active) return;
                ctx.clearRect(0,0,canvas.width, canvas.height);
                dy += 0.6; y += dy; if(y > canvas.height-150) y = canvas.height-150;
                ctx.font = "55px Arial"; ctx.fillText("🟩", 100, y);
                if(frame++ % 110 === 0) obs.push({x: canvas.width});
                obs.forEach((o, i) => {
                    o.x -= 6; ctx.fillText("🌸", o.x, canvas.height-150);
                    if(o.x < 140 && o.x > 60 && y > canvas.height-200) location.reload();
                    if(o.x < -50) { obs.splice(i,1); score++; update(); }
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        function runCatcher() {
            let bx = canvas.width/2, items = [];
            canvas.onmousemove = (e) => bx = e.clientX;
            setInterval(() => { if(active) items.push({x: Math.random()*canvas.width, y: -50, t: Math.random()>0.3?'🍋':'✨'})}, 800);
            function loop() {
                if(!active) return;
                ctx.clearRect(0,0,canvas.width, canvas.height);
                ctx.font = "80px Arial"; ctx.fillText("🧺", bx-40, canvas.height-50);
                items.forEach((it, i) => {
                    it.y += 4.5; ctx.font = "40px Arial"; ctx.fillText(it.t, it.x, it.y);
                    if(it.y > canvas.height-100 && Math.abs(it.x-bx) < 60) { items.splice(i,1); score++; update(); }
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        function update() { document.getElementById('score').innerText = score; }
    </script>
</body>
</html>
