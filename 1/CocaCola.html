<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>SIGMA ULTRA GAMES</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(45deg,#111,#222);
    color:white;
    text-align:center;
    overflow:hidden;
}

h1{
    color:lime;
    text-shadow:0 0 20px lime;
    margin-top:20px;
}

button{
    padding:12px 20px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:10px;
}

#games{
    display:none;
}

.gameBtn{
    background:#333;
    color:white;
    width:250px;
}

.gameBtn:hover{
    background:lime;
    color:black;
}

#gameArea{
    width:90%;
    height:400px;
    margin:auto;
    border:3px solid lime;
    background:black;
    position:relative;
    overflow:hidden;
    border-radius:20px;
}

.target{
    position:absolute;
    font-size:50px;
    cursor:pointer;
    user-select:none;
}

#scoreBoard{
    font-size:25px;
    margin:10px;
    color:yellow;
}

.sigmaMode{
    animation:flash 1s infinite alternate;
}

@keyframes flash{
    from{background:#111;}
    to{background:#003300;}
}
</style>
</head>

<body>

<h1>⚡ SIGMA HUB ⚡</h1>

<button onclick="sigmaMode()">SIGMA</button>

<div id="scoreBoard">
    SCORE: <span id="score">0</span>
</div>

<div id="games">

    <button class="gameBtn" onclick="clickGame()">
        🎯 Click Hunter
    </button>

    <button class="gameBtn" onclick="alienGame()">
        👾 Alien Attack
    </button>

    <button class="gameBtn" onclick="bombGame()">
        💣 Bomb Dodge
    </button>

</div>

<div id="gameArea"></div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

let score = 0;

function updateScore(){
    document.getElementById("score").innerText = score;
}

function sigmaMode(){

    let code = prompt("Введи SIGMA CODE:");

    if(code === "2202"){

        alert("⚡ SIGMA MODE ACTIVATED ⚡");

        document.body.classList.add("sigmaMode");

        document.getElementById("games").style.display = "block";

        document.getElementById("music").play();

    }else{

        alert("❌ WRONG CODE");

    }
}

function clearGame(){
    document.getElementById("gameArea").innerHTML = "";
}

//////////////////////////////////////////////////////
// CLICK GAME
//////////////////////////////////////////////////////

function clickGame(){

    clearGame();

    let area = document.getElementById("gameArea");

    let target = document.createElement("div");

    target.className = "target";

    target.innerHTML = "🎯";

    area.appendChild(target);

    move();

    target.onclick = function(){

        score++;

        updateScore();

        move();
    }

    function move(){

        target.style.left =
            Math.random()*700 + "px";

        target.style.top =
            Math.random()*300 + "px";

        target.style.fontSize =
            (Math.random()*40+30)+"px";
    }

    setInterval(move,1000);
}

//////////////////////////////////////////////////////
// ALIEN GAME
//////////////////////////////////////////////////////

function alienGame(){

    clearGame();

    let area = document.getElementById("gameArea");

    let alien = document.createElement("div");

    alien.className = "target";

    alien.innerHTML = "👾";

    area.appendChild(alien);

    let x = 100;

    let speed = 5;

    alien.style.top = "150px";

    let game = setInterval(()=>{

        x += speed;

        alien.style.left = x + "px";

        if(x > 800){

            x = 0;

        }

    },30);

    alien.onclick = function(){

        score += 5;

        updateScore();

        alien.innerHTML = "💥";

        setTimeout(()=>{

            alien.innerHTML = "👾";

        },300);
    }
}

//////////////////////////////////////////////////////
// BOMB GAME
//////////////////////////////////////////////////////

function bombGame(){

    clearGame();

    let area = document.getElementById("gameArea");

    let bomb = document.createElement("div");

    bomb.className = "target";

    bomb.innerHTML = "💣";

    area.appendChild(bomb);

    moveBomb();

    bomb.onclick = function(){

        score--;

        updateScore();

        alert("💥 BOOM! -1 SCORE");

        moveBomb();
    }

    function moveBomb(){

        bomb.style.left =
            Math.random()*700 + "px";

        bomb.style.top =
            Math.random()*300 + "px";
    }

    setInterval(moveBomb,800);
}

</script>

</body>
</html>
