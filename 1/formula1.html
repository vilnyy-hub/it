<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 News & Champions</title>
    
    <!-- Підключаємо Montserrat для тексту та гоночний шрифт Syne/Orbitron для заголовків -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --f1-red: #e10600;
            --italian-green: #008c45;
            --dark-bg: #0b0b0f; /* Глибший темний колір */
            --card-bg: #15151f;
            --text-white: #ffffff;
            --f1-neon: #00ff85;
            --mercedes-silver: #00a398; /* Фірмовий колір команди Кімі */
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark-bg);
            /* Текстура треку / карбону на фоні */
            background-image: 
                radial-gradient(at 20% 20%, rgba(225, 6, 0, 0.15) 0px, transparent 50%),
                radial-gradient(at 80% 80%, rgba(0, 163, 152, 0.15) 0px, transparent 50%);
            color: var(--text-white);
            margin: 0;
            padding: 30px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .counter-wrapper {
            margin-bottom: 20px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        .counter-wrapper:hover { opacity: 1; }

        /* Стиль фінішного прапора як декорація */
        .f1-header-zone {
            position: relative;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            font-size: 3em;
            color: var(--text-white);
            margin: 10px 0;
            position: relative;
            display: inline-block;
            text-shadow: 0 4px 20px rgba(225, 6, 0, 0.4);
        }

        /* Червона агресивна лінія F1 під заголовком */
        h1::after {
            content: '';
            display: block;
            width: 110%;
            height: 5px;
            background: var(--f1-red);
            margin: 10px auto 0 auto;
            transform: skewX(-30deg); /* Гоночний нахил */
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8em;
            color: var(--text-white);
            margin-top: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .question {
            color: var(--f1-neon);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 15px 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; text-shadow: 0 0 10px var(--f1-neon); }
            100% { opacity: 0.8; }
        }

        /* --- ГОНОЧНА КАРТКА --- */
        .flip-card {
            background-color: transparent;
            width: 340px;
            height: 460px;
            perspective: 1500px;
            margin: 30px auto;
            cursor: pointer;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-card.active .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 2px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        /* Передня сторона картки */
        .flip-card-front {
            background: linear-gradient(145deg, var(--card-bg), #111116);
            border-bottom: 6px solid var(--mercedes-silver); /* Колір команди Мерседес */
        }

        .flip-card-front .img-container {
            width: 100%;
            height: 82%;
            position: relative;
            overflow: hidden;
        }

        .flip-card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .flip-card:hover .flip-card-front img {
            transform: scale(1.05);
        }

        .flip-card-front h3 {
            font-family: 'Orbitron', sans-serif;
            margin: auto;
            font-size: 1.5em;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Задня сторона картки (Італійський стиль) */
        .flip-card-back {
            background: linear-gradient(135deg, rgba(15,15,20,0.98), rgba(0,0,0,0.99));
            color: white;
            transform: rotateY(180deg);
            padding: 30px;
            box-sizing: border-box;
            border: 3px solid var(--f1-red);
            justify-content: center;
            align-items: center;
        }

        /* Гоночна деталь на звороті */
        .flip-card-back::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 8px;
            background: linear-gradient(90deg, var(--italian-green) 33%, #fff 33%, #fff 66%, var(--f1-red) 66%);
        }

        .flip-card-back h3 {
            font-family: 'Orbitron', sans-serif;
            color: var(--f1-red);
            font-size: 1.7em;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .flip-card-back p {
            font-size: 0.95em;
            color: #ccc;
        }

        /* --- БЛОК КОМЕНТАРІВ (Glassmorphism) --- */
        .comments-box {
            background: rgba(31, 31, 39, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            margin-top: 60px;
            padding: 30px;
            border-radius: 16px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .comments-box h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3em; 
            display: flex;
            align-items: center;
            gap: 12px; 
            margin-bottom: 25px;
            color: #fff;
        }

        .f1-car {
            font-size: 1.6em; 
            animation: drive 4s linear infinite;
            display: inline-block;
        }

        @keyframes drive {
            0% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            100% { transform: translateX(-5px); }
        }

        textarea {
            font-family: 'Montserrat', sans-serif;
            width: 100%;
            height: 110px;
            background: rgba(20, 20, 25, 0.8);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            padding: 15px;
            font-size: 15px;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.3s;
            resize: none;
        }

        textarea:focus {
            border-color: var(--f1-red);
        }

        /* Кнопка у формі скошеного гоночного елемента */
        .btn-submit {
            font-family: 'Orbitron', sans-serif;
            background: var(--f1-red);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: skewX(-15deg); /* Нахил кнопки */
            box-shadow: 0 4px 15px rgba(225, 6, 0, 0.4);
        }

        .btn-submit span {
            display: inline-block;
            transform: skewX(15deg); /* Повертаємо текст у норму */
        }

        .btn-submit:hover {
            background: #fff;
            color: var(--dark-bg);
            box-shadow: 0 6px 25px rgba(255, 255, 255, 0.4);
            transform: skewX(-15deg) translateY(-2px);
        }

        /* Стрічка коментарів */
        .comment-list {
            margin-top: 30px;
        }

        .comment-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid var(--f1-red);
            transition: transform 0.2s;
        }

        .comment-item:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="counter-wrapper">
       <img src="https://hitscounter.dev/api/hit?url=https%3A%2F%2Fvilnyy-hub.github.io%2Fit%2F1%2Fformula1.html&label=&icon=github&color=%23198754&message=&style=social&tz=UTC" alt="counter">
    </div>

    <div class="f1-header-zone">
        <h1>News and Championships</h1>
    </div>
    
    <p class="question">Who will be the champion this season?</p>

    <h2>My favorite!!!</h2>
    
    <!-- Інтерактивна картка -->
    <div class="flip-card" onclick="this.classList.toggle('active')">
        <div class="flip-card-inner">
            <div class="flip-card-front">
                <div class="img-container">
                    <img src="https://images.ctfassets.net/1fvlg6xqnm65/5wgQ6aoKoop3VTUOEZQj9o/d2a5b4485246385c79681c1e5a3d7506/Kimi-Catch-Up-MOBILE.jpg?w=626&q=75&fm=webp" alt="Kimi Antonelli">
                </div>
                <h3>Kimi Antonelli</h3>
            </div>
            <div class="flip-card-back">
                <h3>Kimi Antonelli</h3>
                <p>Молода зірка Mercedes та один із найперспективніших пілотів сучасності. Італійський гонщик, який стрімко підкорює світ Формули-1!</p>
                <p style="font-size: 0.85em; color: var(--f1-neon); margin-top: 25px; font-weight: 700; font-family: 'Orbitron'; text-transform: uppercase;">Натисни, щоб повернути</p>
            </div>
        </div>
    </div>

    <!-- Блок обговорення -->
    <div class="comments-box">
        <h3>Обговорення <span class="f1-car">🏎️</span></h3>
        <textarea id="commentInput" placeholder="Напишіть свою думку про сезон F1..."></textarea>
        <button class="btn-submit" onclick="postComment()"><span>Залишити коментар</span></button>
        <div id="commentList" class="comment-list"></div>
    </div>
</div>

<script>
    window.onload = displayComments;

    function postComment() {
        const input = document.getElementById('commentInput');
        const text = input.value.trim();
        if (text === "") return;

        const newComment = {
            text: text,
            date: new Date().toLocaleString('uk-UA')
        };

        let comments = JSON.parse(localStorage.getItem('f1_comments') || '[]');
        comments.unshift(newComment);
        localStorage.setItem('f1_comments', JSON.stringify(comments));
        input.value = ""; 
        displayComments();
    }

    function displayComments() {
        const list = document.getElementById('commentList');
        const comments = JSON.parse(localStorage.getItem('f1_comments') || '[]');
        list.innerHTML = comments.map(comment => `
            <div class="comment-item">
                <span style="font-size: 0.75em; color: #888; font-weight: 700; font-family: 'Orbitron';">${comment.date}</span>
                <div style="margin-top: 8px; font-weight: 500;">${comment.text}</div>
            </div>
        `).join('');
    }
</script>

</body>
</html>
